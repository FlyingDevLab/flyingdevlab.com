<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Punch the Noise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W = 0, H = 0;

function resize(){
  W = cv.width  = Math.min(window.innerWidth, 480);
  H = cv.height = window.innerHeight;
  cv.style.left = Math.round((window.innerWidth - W) / 2) + 'px';
}
resize();
window.addEventListener('resize', resize);

const FT = "'Bebas Neue', Impact, sans-serif";
const FB = "'Inter', 'Helvetica Neue', Arial, sans-serif";

let AC = null;
function ensureAC(){
  if (!AC) try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
}
function beep(freq, type, dur, vol, delay){
  ensureAC(); if (!AC) return;
  try {
    if (AC.state === 'suspended') AC.resume();
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    const t0 = AC.currentTime + (delay || 0);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur);
  } catch(e){}
}
function playHit(n)  { for (let i = 0; i < Math.min(n, 5); i++) beep(280+i*60, 'square',   0.14, 0.2, i*0.04); }
function playWhoosh(){ beep(300, 'sine', 0.1, 0.1); }
function playMiss()  { beep(140, 'sawtooth', 0.25, 0.18); }
function playEnd(result){
  if (result === 'perfect')   [523,659,784,1046,1318].forEach((f,i) => beep(f, 'triangle', 0.35, 0.2, i*0.1));
  else if (result === 'zero') [300,380,460,560].forEach((f,i)        => beep(f, 'triangle', 0.4,  0.2, i*0.12));
  else                        [350,280,210,160].forEach((f,i)         => beep(f, 'sawtooth', 0.4,  0.2, i*0.12));
}

const MAX_BUBBLES    = 100;
const SPAWN_INTERVAL = 30 / MAX_BUBBLES;

let gs = 'title';
let hitCount = 0, missCount = 0, spawnCount = 0;
let frame = 0, lastTS = 0, spawnAcc = 0;
let bubbles = [], particles = [];

let bxPunch = false;
let bxPF    = 0;
let bxHF    = 0;
let punchAngle = 0;

function bX(){ return 42; }
function bY(){ return H * 0.56; }

function rr(x, y, w, h, r){
  cx.beginPath(); cx.moveTo(x+r, y);
  cx.arcTo(x+w,y, x+w,y+h, r); cx.arcTo(x+w,y+h, x,y+h, r);
  cx.arcTo(x,y+h, x,y,     r); cx.arcTo(x,y,   x+w,y,   r);
  cx.closePath();
}

function ptLineDist(px, py, x1, y1, x2, y2){
  const dx = x2-x1, dy = y2-y1, len2 = dx*dx + dy*dy;
  if (!len2) return Math.hypot(px-x1, py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / len2));
  return Math.hypot(px - x1 - t*dx, py - y1 - t*dy);
}

const TEXTS = [
  'RATIO!ЁЯУЙ', 'FAKE!ЁЯдб', 'CLOUTЁЯТи', 'BOTЁЯдЦ', 'CANCELЁЯЪл',
  'SPAMЁЯУз', 'HATEЁЯдм', 'TROLLЁЯШИ', 'CLICKBAITЁЯкд', 'VIRAL HOAXЁЯжа',
  'no one askedЁЯЩД', 'L+RATIOЁЯТА', 'MUTEDЁЯФЗ', 'FAKE NEWSЁЯУ░',
  'NEGATIVITYЁЯТв', 'ALGORITHM TRAPЁЯФД',
];

function spawnBubble(){
  if (spawnCount >= MAX_BUBBLES) return;
  spawnCount++;
  const sz = 36 + Math.random() * 22;
  bubbles.push({
    x: W + sz + 8,
    y: H * 0.08 + Math.random() * H * 0.82,
    sz,
    speed:    1.1 + Math.random() * 1.6,
    text:     TEXTS[Math.floor(Math.random() * TEXTS.length)],
    state:    'fly',
    alpha:    1,
    vx: 0, vy: 0,
    resolved: false,
  });
}

function firePunch(tapX, tapY){
  const sx = bX() + 30, sy = bY() + 5;
  const dx = tapX - sx,  dy = tapY - sy;
  const len = Math.hypot(dx, dy);
  if (len < 3) return;

  const nx = dx/len, ny = dy/len;
  punchAngle = Math.atan2(dy, dx);
  bxPunch = true; bxPF = 0;

  let t = Infinity;
  if (nx >  0.001) t = Math.min(t, (W - sx) / nx);
  if (nx < -0.001) t = Math.min(t,     -sx  / nx);
  if (ny >  0.001) t = Math.min(t, (H - sy) / ny);
  if (ny < -0.001) t = Math.min(t,     -sy  / ny);
  t = Math.max(0, t);
  const ex = sx + nx*t, ey = sy + ny*t;

  let hits = 0;
  bubbles.forEach(b => {
    if (b.state !== 'fly') return;
    if (ptLineDist(b.x, b.y, sx, sy, ex, ey) < b.sz + 44){
      b.state = 'hit'; b.resolved = true;
      const ang = Math.atan2(b.y - sy, b.x - sx);
      b.vx = Math.cos(ang) * 4 + Math.random() * 2;
      b.vy = Math.sin(ang) * 3 - 3 - Math.random() * 3;
      hitCount++; hits++;
      spawnParticles(b.x, b.y, true);
    }
  });

  if (hits > 0) playHit(hits); else playWhoosh();
}

function spawnParticles(x, y, good){
  for (let i = 0; i < 11; i++){
    const a = Math.PI*2*i/11 + Math.random()*0.4, sp = 2 + Math.random()*5;
    particles.push({
      x, y,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      alpha: 1,
      color: good ? `hsl(${38+Math.random()*28},100%,60%)` : '#ff5555',
      sz: 3 + Math.random()*7,
    });
  }
}

function drawBoxer(){
  const bcx = bX(), bcy = bY();
  const bob  = !bxPunch ? Math.sin(frame * 0.07) * 4 : 0;
  const y    = bcy + bob;
  const hOff = bxHF > 0 ? Math.sin(bxHF * 0.72) * 5 : 0;
  const pp   = bxPunch ? Math.min(bxPF / 9, 1) : 0;

  cx.save();

  cx.fillStyle = 'rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(bcx, bcy+127, 46, 9, 0, 0, Math.PI*2); cx.fill();

  cx.fillStyle = '#111';
  rr(bcx-26, y+120, 24, 12, 4); cx.fill();
  rr(bcx+2,  y+120, 25, 12, 4); cx.fill();
  cx.fillStyle = '#ddd';
  cx.fillRect(bcx-21, y+109, 17, 13); cx.fillRect(bcx+4, y+109, 17, 13);

  cx.fillStyle = '#3d7a35';
  cx.fillRect(bcx-23, y+81, 19, 30); cx.fillRect(bcx+4, y+81, 19, 30);

  cx.fillStyle = '#CC0000'; rr(bcx-28, y+40, 56, 43, 6); cx.fill();
  cx.fillStyle = '#FFD700';
  cx.fillRect(bcx-28, y+40, 56, 8); cx.fillRect(bcx-28, y+78, 56, 5);

  cx.fillStyle = '#3d7a35'; rr(bcx-23, y-10, 46, 52, 8); cx.fill();

  cx.fillStyle = '#3d7a35'; rr(bcx-50, y+11, 28, 17, 7); cx.fill();
  cx.fillStyle = '#CC0000';
  cx.beginPath(); cx.ellipse(bcx-56, y+19, 15, 12, -0.2, 0, Math.PI*2); cx.fill();
  cx.strokeStyle = '#990000'; cx.lineWidth = 1.5; cx.stroke();

  if (bxPunch){
    const armLen = 28 + pp * Math.max(W, H) * 1.3;
    const ax = bcx + 24 + Math.cos(punchAngle) * armLen;
    const ay = y   +  8 + Math.sin(punchAngle) * armLen;

    cx.strokeStyle = '#3d7a35'; cx.lineWidth = 17; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(bcx+24, y+8); cx.lineTo(ax, ay); cx.stroke();

    const gs2 = 1 + pp * 0.32;
    cx.fillStyle = pp > 0.65 ? '#FF5000' : '#CC0000';
    cx.beginPath(); cx.arc(ax, ay, 19 * gs2, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = '#990000'; cx.lineWidth = 1.5; cx.stroke();

    if (pp > 0.72){
      cx.save(); cx.globalAlpha = (1 - pp) * 2.8; cx.fillStyle = '#FFD700';
      cx.beginPath(); cx.arc(ax, ay, 30, 0, Math.PI*2); cx.fill(); cx.restore();
    }
  } else {
    cx.fillStyle = '#3d7a35'; rr(bcx+17, y+9, 26, 17, 7); cx.fill();
    cx.fillStyle = '#CC0000';
    cx.beginPath(); cx.ellipse(bcx+49, y+17, 17, 13, 0.2, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = '#990000'; cx.lineWidth = 1.5; cx.stroke();
  }

  const hx = bcx + hOff;
  cx.fillStyle = '#3d7a35';
  cx.beginPath(); cx.ellipse(hx, y-60, 31, 36, 0, 0, Math.PI*2); cx.fill();

/*  cx.strokeStyle = 'rgba(0,0,0,0.48)'; cx.lineWidth = 2.5; cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(hx-14, y-70);
  cx.bezierCurveTo(hx-22, y-73, hx-27, y-60, hx-22, y-52);
  cx.bezierCurveTo(hx-17, y-46, hx-8,  y-50, hx-10, y-60);
  cx.stroke();
  cx.beginPath();
  cx.moveTo(hx-24, y-65); cx.lineTo(hx-31, y-60);
  cx.moveTo(hx-24, y-57); cx.lineTo(hx-31, y-53);
  cx.stroke(); */

  cx.fillStyle = bxHF > 0 ? '#ff9999' : '#fff';
  cx.beginPath(); cx.ellipse(hx-11, y-62, 7, 5.5, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(hx+9,  y-62, 7, 5.5, 0, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#111';
  cx.beginPath(); cx.arc(hx-11, y-62, 3.5, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(hx+9,  y-62, 3.5, 0, Math.PI*2); cx.fill();

  cx.strokeStyle = '#1e3d1c'; cx.lineWidth = 2.5;
  cx.beginPath(); cx.moveTo(hx-18, y-71); cx.lineTo(hx-3,  y-69); cx.stroke();
  cx.beginPath(); cx.moveTo(hx+2,  y-69); cx.lineTo(hx+16, y-71); cx.stroke();

  cx.fillStyle = '#2a5426';
  cx.beginPath(); cx.ellipse(hx-1, y-50, 6, 4, 0, 0, Math.PI*2); cx.fill();

  cx.strokeStyle = '#1e3d1c'; cx.lineWidth = 2;
  if      (bxPunch && pp > 0.5){ cx.beginPath(); cx.arc(hx, y-40, 8, 0, Math.PI);  cx.stroke(); }
  else if (bxHF > 0)            { cx.beginPath(); cx.arc(hx, y-37, 6, Math.PI, 0);  cx.stroke(); }
  else                          { cx.beginPath(); cx.moveTo(hx-9, y-40); cx.lineTo(hx+7, y-40); cx.stroke(); }

  cx.restore();
}

function drawBubble(b){
  cx.save(); cx.globalAlpha = b.alpha;
  if (b.state === 'fly'){
    cx.fillStyle = '#fff'; cx.strokeStyle = '#bbb'; cx.lineWidth = 2;
    rr(b.x - b.sz, b.y - b.sz*0.62, b.sz*2, b.sz*1.24, 9); cx.fill(); cx.stroke();

    cx.beginPath();
    cx.moveTo(b.x - b.sz*0.28, b.y + b.sz*0.62);
    cx.lineTo(b.x - b.sz*0.48, b.y + b.sz*1.0);
    cx.lineTo(b.x + 0.04*b.sz, b.y + b.sz*0.62);
    cx.fillStyle = '#fff'; cx.fill();
    cx.strokeStyle = '#bbb'; cx.lineWidth = 1.5; cx.stroke();

    const fs = Math.max(b.sz * 0.27, 10);
    cx.font = `600 ${fs}px ${FB}`;
    cx.fillStyle = '#222'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(b.text.replace('\n', ' '), b.x, b.y);
  } else if (b.state === 'hit'){
    cx.font = `${b.sz * 1.5}px serif`;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText('ЁЯСН', b.x, b.y);
  }
  cx.restore();
}

function drawHUD(){

  cx.fillStyle = '#FFD700';
  cx.font = `28px ${FT}`;
  cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
  cx.fillText('ЁЯСК ' + hitCount + ' / ' + MAX_BUBBLES, 14, 44);

  if (missCount > 0){
    cx.fillStyle = 'rgba(255,120,120,0.85)';
    cx.font = `400 13px ${FB}`;
    cx.textAlign = 'right';
    cx.fillText('missed ' + missCount, W - 14, 44);
  }

  if (frame < 180){
    cx.save();
    cx.globalAlpha = Math.max(0, 0.8 - frame / 180);
    cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.font = `400 14px ${FB}`;
    cx.textAlign = 'center'; cx.textBaseline = 'bottom';
    cx.fillText('Tap anywhere тАФ fist flies straight to your finger', W/2, H - 16);
    cx.restore();
  }
}

function drawTitle(){
  drawBoxer();
  cx.save(); cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';

  cx.font = `${Math.min(W * 0.17, 68)}px ${FT}`;
  cx.fillStyle = '#FFD700';
  cx.fillText('PUNCH', W/2, H * 0.2);

  cx.font = `${Math.min(W * 0.13, 52)}px ${FT}`;
  cx.fillStyle = '#FF4400';
  cx.fillText('THE NOISE', W/2, H * 0.3);

  cx.font = `400 15px ${FB}`;
  cx.fillStyle = 'rgba(255,255,255,0.6)';
  cx.fillText('100 posts. One fist. Knock them all out.', W/2, H * 0.39);

  cx.globalAlpha = 0.65 + Math.sin(frame * 0.08) * 0.35;
  cx.fillStyle = '#FFD700'; rr(W/2 - 90, H*0.82, 180, 48, 10); cx.fill();
  cx.fillStyle = '#111';
  cx.font = `26px ${FT}`; cx.textBaseline = 'middle';
  cx.fillText('TAP TO START', W/2, H*0.82 + 24);

  cx.restore();
}

function drawEnd(){
  cx.fillStyle = 'rgba(0,0,0,0.86)'; cx.fillRect(0, 0, W, H);
  cx.save(); cx.textAlign = 'center';

  const perfect  = hitCount === MAX_BUBBLES;
  const toughGuy = hitCount === 0;
  const fs = Math.min(W * 0.14, 56);

  if (perfect){

    cx.font = `${fs}px ${FT}`; cx.textBaseline = 'alphabetic';
    cx.fillStyle = '#FFD700';
    cx.fillText('PERFECT', W/2, H * 0.27);

    cx.font = `${fs * 0.68}px ${FT}`;
    cx.fillStyle = '#fff';
    cx.fillText('KNOCKOUT', W/2, H * 0.36);

    cx.font = `400 17px ${FB}`; cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.fillText('You silenced every last one.', W/2, H * 0.47);

    cx.font = `400 14px ${FB}`; cx.fillStyle = 'rgba(255,215,0,0.75)';
    cx.fillText('Use your real voice. Change the world.', W/2, H * 0.56);

  } else if (toughGuy){

    cx.font = `${fs}px ${FT}`; cx.textBaseline = 'alphabetic';
    cx.fillStyle = '#FFD700';
    cx.fillText('TOUGH GUY.', W/2, H * 0.27);

    cx.font = `400 17px ${FB}`; cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.fillText("You didn't even flinch.", W/2, H * 0.38);

    cx.font = `400 14px ${FB}`; cx.fillStyle = 'rgba(255,215,0,0.75)';
    cx.fillText("Real strength is knowing what's not", W/2, H * 0.47);
    cx.fillText("worth your time.", W/2, H * 0.53);

  } else {

    cx.font = `${fs}px ${FT}`; cx.textBaseline = 'alphabetic';
    cx.fillStyle = '#FF4400';
    cx.fillText('FIGHT DONE.', W/2, H * 0.27);

    cx.font = `400 17px ${FB}`; cx.fillStyle = 'rgba(255,255,255,0.85)';
    cx.fillText('You knocked out ' + hitCount + ' posts.', W/2, H * 0.38);
    cx.fillText("The rest weren't worth your time.", W/2, H * 0.46);

    cx.font = `400 14px ${FB}`; cx.fillStyle = 'rgba(255,215,0,0.75)';
    cx.fillText('Use your real voice. Change the world.', W/2, H * 0.56);
  }

  cx.globalAlpha = 0.55 + Math.sin(frame * 0.08) * 0.45;
  cx.font = `22px ${FT}`; cx.textBaseline = 'alphabetic'; cx.fillStyle = '#fff';
  cx.fillText('TAP TO PLAY AGAIN', W/2, H * 0.77);

  cx.restore();
}

function startGame(){
  hitCount = 0; missCount = 0; spawnCount = 0;
  frame = 0; spawnAcc = 0;
  bubbles = []; particles = [];
  bxPunch = false; bxPF = 0; bxHF = 0; punchAngle = 0;
  gs = 'playing';
}

function doTap(tapX, tapY){
  ensureAC(); if (AC && AC.state === 'suspended') AC.resume();
  if (gs === 'title'   ){ startGame(); return; }
  if (gs === 'gameover'){ startGame(); return; }
  if (gs === 'playing' ) firePunch(tapX, tapY);
}

cv.addEventListener('click', e => doTap(e.offsetX, e.offsetY));
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect(), t = e.touches[0];
  doTap(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

function drawBG(){
  cx.fillStyle = '#080303'; cx.fillRect(0, 0, W, H);
  const sp = cx.createRadialGradient(W*0.28, H*0.44, 0, W*0.28, H*0.44, W*0.9);
  sp.addColorStop(0, 'rgba(255,110,20,0.06)');
  sp.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle = sp; cx.fillRect(0, 0, W, H);
}

function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS = ts; frame++;

  if (gs === 'playing'){

    if (bxPunch){ bxPF++; if (bxPF > 20){ bxPunch = false; bxPF = 0; } }
    if (bxHF > 0){ bxHF++; if (bxHF > 26) bxHF = 0; }

    if (spawnCount < MAX_BUBBLES){
      spawnAcc += dt;
      while (spawnAcc >= SPAWN_INTERVAL && spawnCount < MAX_BUBBLES){
        spawnBubble(); spawnAcc -= SPAWN_INTERVAL;
      }
    }

    bubbles.forEach(b => {
      if (b.state === 'fly'){
        b.x -= b.speed;

        if (b.x < bX() - 35 && !b.resolved){
          b.state = 'miss'; b.resolved = true;
          missCount++; bxHF = 1;
          playMiss();
          spawnParticles(bX() - 20, bY() - 30, false);
        }
      } else if (b.state === 'hit'){
        b.x += b.vx; b.y += b.vy; b.vy += 0.28; b.alpha -= 0.022;
      } else if (b.state === 'miss'){
        b.alpha -= 0.06;
      }
    });
    bubbles = bubbles.filter(b => b.alpha > 0.01);

    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.alpha -= 0.028; });
    particles = particles.filter(p => p.alpha > 0.01);

    if (spawnCount >= MAX_BUBBLES && bubbles.length === 0){
      gs = 'gameover';
      const result = hitCount === MAX_BUBBLES ? 'perfect'
                   : hitCount === 0           ? 'zero'
                   :                            'mixed';
      playEnd(result);
    }
  }

  drawBG();
  if (gs === 'title'){
    drawTitle();
  } else {
    drawBoxer();
    bubbles.forEach(drawBubble);
    particles.forEach(p => {
      cx.save(); cx.globalAlpha = p.alpha; cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, p.sz, 0, Math.PI*2); cx.fill(); cx.restore();
    });
    drawHUD();
    if (gs === 'gameover') drawEnd();
  }
}

requestAnimationFrame(ts => { lastTS = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
