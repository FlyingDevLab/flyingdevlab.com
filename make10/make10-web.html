<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- user-scalable=no でゲーム中のピンチズームを無効化する -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAKE10 – 30秒チャレンジ</title>
<!-- Google Fonts の接続を事前に確立して読み込みを高速化する -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="make10-web.css">
</head>
<body>

<!-- アニメーションする背景の光球（装飾のみ・スクリーンリーダーには読み上げさせない） -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- ゲーム全体のコンテナ。各画面（タイトル/プレイ/リザルト）を内包する -->
<div class="game-container" id="gameContainer">

  <!-- ===== TITLE SCREEN ===== -->
  <div class="screen active" id="titleScreen">
    <div class="glass-card" style="text-align:center;">
      <div class="title-logo">MAKE 10</div>
      <div class="title-sub">30-SECOND CHALLENGE</div>
      <!-- ハイスコアがある場合のみJSで文字を挿入する -->
      <div class="title-hi" id="titleHi"></div>
      <div class="title-rule">
        数字を足して <strong>10</strong> にしよう！<br>
        Pick the number that adds up to <strong>10</strong>!
      </div>
      <button class="btn btn-primary" onclick="startGame()" style="width:100%;">
        🚀 スタート / START
      </button>
    </div>
  </div>

  <!-- ===== PLAY SCREEN ===== -->
  <div class="screen" id="playScreen">
    <!-- ヘッダー：ホームボタン・スコア・コンボ表示 -->
    <div class="play-header">
      <button class="btn-home" onclick="goHome()" title="Home">🏠</button>
      <div class="score-display">SCORE <span id="scoreValue">0</span></div>
      <div class="combo-display" id="comboDisplay"></div>
    </div>

    <!-- タイムゲージ：残り時間を割合で表示する -->
    <div class="gauge-wrapper">
      <div class="gauge-bar" id="gaugeBar" style="width:100%;"></div>
    </div>

    <!-- 問題エリア：現在の数字・ヒント・次の数字プレビューを表示する -->
    <div class="question-area" id="questionArea">
      <div class="question-card">
        <div class="question-label">MAKE 10!</div>
        <div class="question-number" id="questionNumber">5</div>
        <div class="question-hint"><span id="questionPlus">5</span> + ? = 10</div>
        <div class="next-label">NEXT</div>
        <!-- 次の問題の数字をあらかじめ表示してプレイヤーに予告する -->
        <div class="next-number" id="nextNumber"></div>
      </div>
    </div>

    <!-- 選択肢タイル：JSで動的に生成される -->
    <div class="tiles-grid" id="tilesGrid"></div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div class="screen" id="resultScreen">
    <div class="glass-card" style="text-align:center;">
      <div class="result-score-label">YOUR SCORE</div>
      <div class="result-score" id="resultScore">0</div>
      <!-- ハイスコア表示。新記録時はJSでスタイルを切り替える -->
      <div class="result-hi" id="resultHi"></div>
      <div class="result-message" id="resultMessage">Try again!</div>
      <div class="result-combo" id="resultCombo"></div>
      <div class="result-buttons">
        <button class="btn btn-primary" onclick="startGame()" style="width:100%;">
          🔄 もう一度 / Retry
        </button>
        <!-- App StoreボタンはURL確定後にコメントアウトを解除する -->
        <!-- <a class="btn btn-appstore" href="javascript:void(0)" id="appStoreBtn" style="width:100%;">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          App Storeでダウンロード
        </a> -->
        <button class="btn btn-secondary" onclick="goHome()" style="width:100%;">
          🏠 タイトルへ / Home
        </button>
      </div>
    </div>
  </div>

</div>

<script src="make10-web.js"></script>
</body>
</html>
