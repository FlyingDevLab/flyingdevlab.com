  <!--
  ============================================================
  【設計メモ: 1ファイル完結・配列型翻訳】

  ■ なぜ1ファイルで完結しているのか
    このページへのアクセスはほぼ100%アプリ内リンク経由です。
    検索流入を期待するページではないため、hreflang などの SEO 設定は割り切っています。
    1ファイルにまとめることで、翻訳の追加・修正・デプロイがすべて1ファイルで完結します。

  ■ 翻訳データの持ち方：「配列型オブジェクト」
    翻訳テキストを T[言語コード].sections[] の配列で管理しています（下部の const T を参照）。
    各要素は { icon, title, html } の3フィールドを持ち、renderSection() がカードを描画します。
    セクションを追加・削除するとき、全言語の配列に要素を1つ追加・削除するだけで済みます。

  ■ なぜ MAKE10（make10.html）と翻訳方式が違うのか
    このページのすべてのセクションは同じカード構造（アイコン＋タイトル＋本文）です。
    構造が統一されているため、テキスト＋HTMLをまとめて配列に持たせ JS で描画するのが自然でした。

    一方、MAKE10 のプライバシーページはプロミスカード・ハイライトボックス・
    コンタクトボックスなど、セクションごとに HTML の構造が大きく異なります。
    そのため HTML はファイルに直接書き、キーで差し替える方式（キー型オブジェクト）を採用しています。

  ■ フォールバックの有無
    MAKE10（キー型）は翻訳キーが欠けても英語（"en"）の値で代替します。
    このファイル（配列型）にはフォールバックがないため、セクション数は全言語で揃えてください。

  ■ ファイルサイズについて
    25言語分のテキストを JSON として埋め込んでいるため、ファイルサイズは大きめです
    （gzip後で約50〜70KB程度）。
    ただし画像も動的処理もないテキストページなので、体感速度への影響はほぼゼロです。
  ============================================================
  -->

const T = {"ja":{"meta":{"langName":"日本語","selectLabel":"言語","updatedLabel":"最終更新日","updatedDate":"2026年5月15日"},"sections":[{"icon":"📋","title":"はじめに","html":"<p>空飛ぶ研究室（Flying Dev Lab）が提供するiOSアプリ「PriceWise（単価比べ）」のプライバシーポリシーです。</p><p>本アプリをご利用いただく前に、本ポリシーをご確認ください。</p>"},{"icon":"💾","title":"端末内に保存するデータ","html":"<div class='zero-data'><p>🔒 入力データは端末内にのみ保存され、開発者サーバーへ送信されません。</p></div><ul><li>比較セッションのデータ（価格・数量・名称・メモ）</li><li>メモリスト</li><li>テーマ設定（選択中の配色）</li></ul><p>アプリを削除すると、これらのデータはすべて削除されます。</p>"},{"icon":"📢","title":"広告について（Google AdMob）","html":"<p>無料ユーザー向けに <strong>Google AdMob</strong>（Google LLC）による広告を表示します。AdMob は以下の情報を収集する場合があります。</p><ul><li>広告識別子（IDFA）— App Tracking Transparency の許可がある場合のみ</li><li>おおよその位置情報（IPアドレスに基づく推定）</li><li>クラッシュログ・パフォーマンスデータ</li><li>広告インプレッション・インタラクション情報</li></ul><p>詳細は <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google プライバシーポリシー</a> をご確認ください。</p><p>広告削除（Remove Ads）を購入いただいた場合、AdMob による広告配信は完全に停止されます。</p>"},{"icon":"🛒","title":"アプリ内課金について","html":"<p>本アプリは <strong>広告削除（Remove Ads）</strong> の買い切り購入を提供しています。</p><p>購入処理はApple（App Store）が行い、当開発者はお客様の決済情報・個人情報を受け取りません。<a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Appleのプライバシーポリシー</a>もご参照ください。</p>"},{"icon":"🔒","title":"第三者への情報提供","html":"<p>当開発者は、法令に基づく場合を除き、利用者の情報を第三者に提供・販売することはありません。</p><p>広告配信のため Google AdMob SDK を使用しており、同SDKが収集したデータは Google LLC のサーバーへ送信されます。詳細は「広告について」セクションをご確認ください。</p>"},{"icon":"⚖️","title":"準拠法・管轄","html":"<p>本ポリシーは日本法に準拠します。本ポリシーに関する紛争については、当開発者の所在地を管轄する裁判所を専属的合意管轄とします。</p>"},{"icon":"⚠️","title":"免責事項","html":"<p>本アプリは可能な限り正確な計算結果を提供するよう努めていますが、その完全性・正確性を保証するものではありません。計算結果はあくまで参考情報としてご利用ください。</p><p>iOSのアップデートや端末環境の変化により、予告なくアプリの動作に影響が生じる場合があります。</p><p>当開発者は、事前の予告なくアプリの提供を終了・変更する場合があります。</p>"},{"icon":"🔄","title":"プライバシーポリシーの変更","html":"<p>本ポリシーは必要に応じて改定することがあります。変更後のポリシーは本ページに掲載した時点で効力を生じます。重要な変更がある場合は、アプリ内でお知らせします。</p>"},{"icon":"📬","title":"お問い合わせ","html":"<p><a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a> のお問い合わせフォームから匿名でご意見をお送りいただけます。</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"en":{"meta":{"langName":"English","selectLabel":"Language","updatedLabel":"Last updated","updatedDate":"May 15, 2026"},"sections":[{"icon":"📋","title":"Introduction","html":"<p>This is the Privacy Policy for <strong>PriceWise (単価比べ)</strong>, an iOS app developed by Flying Dev Lab.</p><p>Please read this policy before using the App.</p>"},{"icon":"💾","title":"Data Stored on Your Device","html":"<div class='zero-data'><p>🔒 Your data is stored only on your device and never sent to our servers.</p></div><ul><li>Comparison session data (price, quantity, name, memo)</li><li>Shopping memo list</li><li>Theme preference (selected color scheme)</li></ul><p>Deleting the App removes all data from your device.</p>"},{"icon":"📢","title":"Advertising (Google AdMob)","html":"<p>The App displays ads via <strong>Google AdMob</strong> (Google LLC) for free users. AdMob may collect:</p><ul><li>Advertising identifier (IDFA) — only if App Tracking Transparency permission is granted</li><li>Approximate location (estimated from IP address)</li><li>Crash logs and performance data</li><li>Ad impression and interaction data</li></ul><p>See <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google's Privacy Policy</a> for details.</p><p>Purchasing <strong>Remove Ads</strong> fully stops all AdMob ad delivery.</p>"},{"icon":"🛒","title":"In-App Purchases","html":"<p>The App offers a one-time <strong>Remove Ads</strong> purchase.</p><p>All payment processing is handled by Apple (App Store). We do not receive your payment details or personal information. See <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apple's Privacy Policy</a>.</p>"},{"icon":"🔒","title":"Sharing of Information","html":"<p>We do not sell or share user information with third parties, das Löschen der App werden alle Daten von Ihrem Gerät entfernt.</p>"},{"icon":"📢","title":"Werbung (Google AdMob)","html":"<p>Die App zeigt Werbung über <strong>Google AdMob</strong> (Google LLC) für kostenlose Nutzer. AdMob kann folgende Daten erfassen:</p><ul><li>Werbe-ID (IDFA) – nur bei Zustimmung zu App Tracking Transparency</li><li>Ungefährer Standort (anhand der IP-Adresse)</li><li>Absturzprotokolle und Leistungsdaten</li><li>Anzeigenimpressionen und Interaktionsdaten</li></ul><p>Weitere Informationen in der <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Datenschutzrichtlinie von Google</a>.</p><p>Mit dem Kauf von «Werbung entfernen» wird AdMob-Werbung vollständig eingestellt.</p>"},{"icon":"🛒","title":"In-App-Käufe","html":"<p>Die App bietet einen einmaligen Kauf «Werbung entfernen» an.</p><p>Die Zahlung erfolgt über Apple (App Store). Wir erhalten keine Zahlungs- oder persönlichen Daten. Siehe <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apple-Datenschutzrichtlinie</a>.</p>"},{"icon":"🔒","title":"Weitergabe von Informationen","html":"<p>Wir verkaufen oder teilen Nutzerdaten nicht mit Dritten, außer wenn gesetzlich vorgeschrieben.</p><p>Die App verwendet das Google AdMob SDK. Von AdMob erfasste Daten werden an Google LLC-Server übertragen. Details im Abschnitt «Werbung».</p>"},{"icon":"⚖️","title":"Anwendbares Recht","html":"<p>Diese Richtlinie unterliegt japanischem Recht. Streitigkeiten unterliegen der ausschließlichen Zuständigkeit der Gerichte am Standort des Entwicklers.</p>"},{"icon":"⚠️","title":"Haftungsausschluss","html":"<p>Obwohl die App genaue Ergebnisse liefern soll, übernehmen wir keine Garantie für Vollständigkeit oder Richtigkeit. Alle Ergebnisse dienen nur als Referenz.</p><p>iOS-Updates können die App-Funktionalität ohne Vorankündigung beeinträchtigen.</p><p>Der Entwickler kann die App ohne Vorankündigung einstellen oder ändern.</p>"},{"icon":"🔄","title":"Änderungen dieser Richtlinie","html":"<p>Wir können diese Richtlinie jederzeit aktualisieren. Änderungen treten mit Veröffentlichung in Kraft. Wesentliche Änderungen werden in der App mitgeteilt.</p>"},{"icon":"📬","title":"Kontakt","html":"<p>Anonymes Feedback über das Kontaktformular auf <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"fr":{"meta":{"langName":"Français","selectLabel":"Langue","updatedLabel":"Dernière mise à jour","updatedDate":"15 mai 2026"},"sections":[{"icon":"📋","title":"Introduction","html":"<p>Voici la politique de confidentialité de <strong>PriceWise (単価比べ)</strong>, une application iOS développée par Flying Dev Lab.</p><p>Veuillez lire cette politique avant d'utiliser l'application.</p>"},{"icon":"💾","title":"Données stockées sur votre appareil","html":"<div class='zero-data'><p>🔒 Vos données sont stockées uniquement sur votre appareil et ne sont jamais envoyées à nos serveurs.</p></div><ul><li>Données de comparaison (prix, quantité, nom, mémo)</li><li>Liste de courses</li><li>Préférence de thème (schéma de couleurs choisi)</li></ul><p>La suppression de l'application efface toutes ces données.</p>"},{"icon":"📢","title":"Publicité (Google AdMob)","html":"<p>L'application affiche des publicités via <strong>Google AdMob</strong> (Google LLC) pour les utilisateurs gratuits. AdMob peut collecter :</p><ul><li>Identifiant publicitaire (IDFA) — uniquement si la permission App Tracking Transparency est accordée</li><li>Localisation approximative (estimée à partir de l'adresse IP)</li><li>Journaux de plantage et données de performance</li><li>Impressions publicitaires et données d'interaction</li></ul><p>Consultez la <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Politique de confidentialité de Google</a> pour plus de détails.</p><p>L'achat de «Supprimer les publicités» arrête complètement la diffusion d'annonces AdMob.</p>"},{"icon":"🛒","title":"Achats intégrés","html":"<p>L'application propose un achat unique «Supprimer les publicités».</p><p>Tous les paiements sont traités par Apple (App Store). Nous ne recevons pas vos informations de paiement ou personnelles. Voir la <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Politique de confidentialité d'Apple</a>.</p>"},{"icon":"🔒","title":"Partage d'informations","html":"<p>Nous ne vendons ni ne partageons les données des utilisateurs avec des tiers, sauf obligation légale.</p><p>L'application utilise le SDK Google AdMob. Les données collectées par AdMob sont transmises aux serveurs de Google LLC. Voir la section «Publicité».</p>"},{"icon":"⚖️","title":"Droit applicable","html":"<p>Cette politique est régie par le droit japonais. Tout litige relève de la compétence exclusive des tribunaux du lieu du développeur.</p>"},{"icon":"⚠️","title":"Avertissement","html":"<p>Bien que l'application s'efforce de fournir des résultats précis, nous ne garantissons pas leur exhaustivité ou exactitude. Veuillez les considérer comme des informations de référence uniquement.</p><p>Les mises à jour iOS peuvent affecter le fonctionnement de l'application sans préavis.</p><p>Le développeur peut arrêter ou modifier l'application sans préavis.</p>"},{"icon":"🔄","title":"Modifications de cette politique","html":"<p>Nous pouvons mettre à jour cette politique à tout moment. Les modifications entrent en vigueur dès leur publication. Les modifications importantes seront notifiées dans l'application.</p>"},{"icon":"📬","title":"Contact","html":"<p>Vous pouvez envoyer des commentaires anonymes via le formulaire de contact sur <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"es":{"meta":{"langName":"Español","selectLabel":"Idioma","updatedLabel":"Última actualización","updatedDate":"15 de mayo de 2026"},"sections":[{"icon":"📋","title":"Introducción","html":"<p>Esta es la política de privacidad de <strong>PriceWise (単価比べ)</strong>, una aplicación iOS desarrollada por Flying Dev Lab.</p><p>Lea esta política antes de usar la aplicación.</p>"},{"icon":"💾","title":"Datos almacenados en tu dispositivo","html":"<div class='zero-data'><p>🔒 Tus datos se almacenan solo en tu dispositivo y nunca se envían a nuestros servidores.</p></div><ul><li>Datos de comparación (precio, cantidad, nombre, nota)</li><li>Lista de compras</li><li>Preferencia de tema (esquema de colores seleccionado)</li></ul><p>Eliminar la aplicación borra todos estos datos.</p>"},{"icon":"📢","title":"Publicidad (Google AdMob)","html":"<p>La aplicación muestra anuncios a través de <strong>Google AdMob</strong> (Google LLC) para usuarios gratuitos. AdMob puede recopilar:</p><ul><li>Identificador de publicidad (IDFA) — solo si se concede el permiso de App Tracking Transparency</li><li>Ubicación aproximada (estimada a partir de la dirección IP)</li><li>Registros de fallos y datos de rendimiento</li><li>Impresiones de anuncios y datos de interacción</li></ul><p>Consulta la <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Política de privacidad de Google</a> para más detalles.</p><p>Comprar «Eliminar anuncios» detiene completamente la publicidad de AdMob.</p>"},{"icon":"🛒","title":"Compras dentro de la app","html":"<p>La aplicación ofrece una compra única «Eliminar anuncios».</p><p>Todos los pagos son procesados por Apple (App Store). No recibimos tus datos de pago ni información personal. Ver la <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Política de privacidad de Apple</a>.</p>"},{"icon":"🔒","title":"Compartir información","html":"<p>No vendemos ni compartimos información de usuarios con terceros, excepto cuando la ley lo requiera.</p><p>La aplicación usa el SDK de Google AdMob. Los datos recopilados por AdMob se transmiten a los servidores de Google LLC. Consulta la sección «Publicidad».</p>"},{"icon":"⚖️","title":"Ley aplicable","html":"<p>Esta política se rige por las leyes de Japón. Las disputas estarán sujetas a la jurisdicción exclusiva de los tribunales en la ubicación del desarrollador.</p>"},{"icon":"⚠️","title":"Aviso legal","html":"<p>Aunque la aplicación se esfuerza por proporcionar resultados precisos, no garantizamos su integridad o exactitud. Trata todos los resultados solo como información de referencia.</p><p>Las actualizaciones de iOS pueden afectar el funcionamiento sin previo aviso.</p><p>El desarrollador puede terminar o modificar la app sin previo aviso.</p>"},{"icon":"🔄","title":"Cambios en esta política","html":"<p>Podemos actualizar esta política en cualquier momento. Los cambios entran en vigor cuando se publican. Los cambios significativos se notificarán en la aplicación.</p>"},{"icon":"📬","title":"Contacto","html":"<p>Puedes enviar comentarios anónimos a través del formulario de contacto en <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"it":{"meta":{"langName":"Italiano","selectLabel":"Lingua","updatedLabel":"Ultimo aggiornamento","updatedDate":"15 maggio 2026"},"sections":[{"icon":"📋","title":"Introduzione","html":"<p>Questa è la politica sulla privacy di <strong>PriceWise (単価比べ)</strong>, un'app iOS sviluppata da Flying Dev Lab.</p><p>Leggi questa politica prima di utilizzare l'app.</p>"},{"icon":"💾","title":"Dati archiviati sul dispositivo","html":"<div class='zero-data'><p>🔒 I tuoi dati sono archiviati solo sul tuo dispositivo e non vengono mai inviati ai nostri server.</p></div><ul><li>Dati di confronto (prezzo, quantità, nome, nota)</li><li>Lista della spesa</li><li>Preferenza tema (schema colori selezionato)</li></ul><p>L'eliminazione dell'app rimuove tutti questi dati.</p>"},{"icon":"📢","title":"Pubblicità (Google AdMob)","html":"<p>L'app mostra annunci tramite <strong>Google AdMob</strong> (Google LLC) per gli utenti gratuiti. AdMob può raccogliere:</p><ul><li>Identificatore pubblicitario (IDFA) — solo se concessa l'autorizzazione App Tracking Transparency</li><li>Posizione approssimativa (stimata dall'indirizzo IP)</li><li>Log di arresti anomali e dati sulle prestazioni</li><li>Impressioni pubblicitarie e dati di interazione</li></ul><p>Consulta l'<a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Informativa sulla privacy di Google</a> per i dettagli.</p><p>L'acquisto di «Rimuovi annunci» interrompe completamente la pubblicità AdMob.</p>"},{"icon":"🛒","title":"Acquisti in-app","html":"<p>L'app offre un acquisto unico «Rimuovi annunci».</p><p>Tutti i pagamenti sono elaborati da Apple (App Store). Non riceviamo dati di pagamento o personali. Vedi l'<a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Informativa sulla privacy di Apple</a>.</p>"},{"icon":"🔒","title":"Condivisione delle informazioni","html":"<p>Non vendiamo né condividiamo le informazioni degli utenti con terze parti, salvo quanto richiesto dalla legge.</p><p>L'app utilizza il SDK Google AdMob. I dati raccolti da AdMob vengono trasmessi ai server di Google LLC. Vedi la sezione «Pubblicità».</p>"},{"icon":"⚖️","title":"Legge applicabile","html":"<p>Questa politica è disciplinata dalle leggi giapponesi. Le controversie saranno soggette alla giurisdizione esclusiva dei tribunali nella sede dello sviluppatore.</p>"},{"icon":"⚠️","title":"Dichiarazione di non responsabilità","html":"<p>Sebbene l'app si sforzi di fornire risultati accurati, non garantiamo la loro completezza o accuratezza. Considera tutti i risultati solo come informazioni di riferimento.</p><p>Gli aggiornamenti iOS potrebbero influire sull'app senza preavviso.</p><p>Lo sviluppatore può terminare o modificare l'app senza preavviso.</p>"},{"icon":"🔄","title":"Modifiche a questa politica","html":"<p>Possiamo aggiornare questa politica in qualsiasi momento. Le modifiche entrano in vigore al momento della pubblicazione. Le modifiche significative saranno notificate nell'app.</p>"},{"icon":"📬","title":"Contatti","html":"<p>Puoi inviare feedback anonimo tramite il modulo di contatto su <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"pt-BR":{"meta":{"langName":"Português (Brasil)","selectLabel":"Idioma","updatedLabel":"Última atualização","updatedDate":"15 de maio de 2026"},"sections":[{"icon":"📋","title":"Introdução","html":"<p>Esta é a política de privacidade do <strong>PriceWise (単価比べ)</strong>, um app iOS desenvolvido pela Flying Dev Lab.</p><p>Leia esta política antes de usar o aplicativo.</p>"},{"icon":"💾","title":"Dados armazenados no dispositivo","html":"<div class='zero-data'><p>🔒 Seus dados são armazenados apenas no seu dispositivo e nunca enviados aos nossos servidores.</p></div><ul><li>Dados de comparação (preço, quantidade, nome, nota)</li><li>Lista de compras</li><li>Preferência de tema (esquema de cores selecionado)</li></ul><p>Excluir o aplicativo remove todos esses dados do seu dispositivo.</p>"},{"icon":"📢","title":"Publicidade (Google AdMob)","html":"<p>O aplicativo exibe anúncios via <strong>Google AdMob</strong> (Google LLC) para usuários gratuitos. O AdMob pode coletar:</p><ul><li>Identificador de publicidade (IDFA) — somente se a permissão de App Tracking Transparency for concedida</li><li>Localização aproximada (estimada pelo endereço IP)</li><li>Logs de falhas e dados de desempenho</li><li>Impressões de anúncios e dados de interação</li></ul><p>Consulte a <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Política de Privacidade do Google</a> para mais detalhes.</p><p>A compra de «Remover anúncios» interrompe completamente os anúncios do AdMob.</p>"},{"icon":"🛒","title":"Compras no aplicativo","html":"<p>O aplicativo oferece uma compra única «Remover anúncios».</p><p>Todos os pagamentos são processados pela Apple (App Store). Não recebemos seus dados de pagamento ou informações pessoais. Consulte a <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Política de Privacidade da Apple</a>.</p>"},{"icon":"🔒","title":"Compartilhamento de informações","html":"<p>Não vendemos nem compartilhamos informações dos usuários com terceiros, exceto quando exigido por lei.</p><p>O aplicativo usa o SDK do Google AdMob. Os dados coletados pelo AdMob são transmitidos aos servidores da Google LLC. Consulte a seção «Publicidade».</p>"},{"icon":"⚖️","title":"Lei aplicável","html":"<p>Esta política é regida pelas leis do Japão. Quaisquer disputas estarão sujeitas à jurisdição exclusiva dos tribunais na localização do desenvolvedor.</p>"},{"icon":"⚠️","title":"Aviso legal","html":"<p>Embora o aplicativo se esforce para fornecer resultados precisos, não garantimos sua integridade ou exatidão. Trate todos os resultados apenas como informações de referência.</p><p>Atualizações do iOS podem afetar o funcionamento do aplicativo sem aviso prévio.</p><p>O desenvolvedor pode encerrar ou modificar o aplicativo sem aviso prévio.</p>"},{"icon":"🔄","title":"Alterações nesta política","html":"<p>Podemos atualizar esta política a qualquer momento. As alterações entram em vigor quando publicadas. Alterações significativas serão notificadas no aplicativo.</p>"},{"icon":"📬","title":"Contato","html":"<p>Você pode enviar feedback anônimo pelo formulário de contato em <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"ko":{"meta":{"langName":"한국어","selectLabel":"언어","updatedLabel":"최종 업데이트","updatedDate":"2026년 5월 15일"},"sections":[{"icon":"📋","title":"소개","html":"<p>이것은 Flying Dev Lab이 개발한 iOS 앱 <strong>PriceWise（単価比べ）</strong>의 개인정보 처리방침입니다.</p><p>앱을 사용하기 전에 이 방침을 읽어 주세요.</p>"},{"icon":"💾","title":"기기에 저장되는 데이터","html":"<div class='zero-data'><p>🔒 데이터는 기기에만 저장되며 당사 서버로 전송되지 않습니다.</p></div><ul><li>비교 세션 데이터 (가격, 수량, 이름, 메모)</li><li>쇼핑 메모 목록</li><li>테마 설정 (선택한 색상 구성표)</li></ul><p>앱을 삭제하면 이러한 데이터가 기기에서 모두 삭제됩니다.</p>"},{"icon":"📢","title":"광고 (Google AdMob)","html":"<p>앱은 무료 사용자를 위해 <strong>Google AdMob</strong> (Google LLC)을 통해 광고를 표시합니다. AdMob은 다음을 수집할 수 있습니다:</p><ul><li>광고 식별자 (IDFA) — App Tracking Transparency 권한이 부여된 경우에만</li><li>대략적인 위치 (IP 주소로 추정)</li><li>충돌 로그 및 성능 데이터</li><li>광고 노출 및 상호작용 데이터</li></ul><p>자세한 내용은 <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google 개인정보처리방침</a>을 참조하세요.</p><p>«광고 제거» 구매 시 AdMob 광고가 완전히 중단됩니다.</p>"},{"icon":"🛒","title":"앱 내 구매","html":"<p>앱은 일회성 «광고 제거» 구매를 제공합니다.</p><p>모든 결제는 Apple (App Store)에서 처리합니다. 당사는 결제 정보나 개인 정보를 받지 않습니다. <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apple 개인정보처리방침</a>을 참조하세요.</p>"},{"icon":"🔒","title":"정보 공유","html":"<p>법적으로 요구되는 경우를 제외하고 사용자 정보를 제3자에게 판매하거나 공유하지 않습니다.</p><p>앱은 광고를 위해 Google AdMob SDK를 사용하며, AdMob이 수집한 데이터는 Google LLC 서버로 전송됩니다. «광고» 섹션을 참조하세요.</p>"},{"icon":"⚖️","title":"준거법","html":"<p>이 방침은 일본 법률의 적용을 받습니다. 분쟁은 개발자 소재지 관할 법원의 전속 관할에 따릅니다.</p>"},{"icon":"⚠️","title":"면책 조항","html":"<p>앱이 정확한 계산 결과를 제공하기 위해 노력하지만, 그 완전성이나 정확성을 보장하지 않습니다. 모든 결과는 참고 정보로만 사용하시기 바랍니다.</p><p>iOS 업데이트나 기기 환경 변화로 인해 사전 예고 없이 앱 기능에 영향을 줄 수 있습니다.</p><p>개발자는 사전 예고 없이 앱을 종료하거나 변경할 수 있습니다.</p>"},{"icon":"🔄","title":"방침 변경","html":"<p>당사는 언제든지 이 방침을 업데이트할 수 있습니다. 변경 사항은 이 페이지에 게시되면 효력이 발생합니다. 중요한 변경 사항은 앱 내에서 알려드립니다.</p>"},{"icon":"📬","title":"연락처","html":"<p><a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>의 문의 양식을 통해 익명으로 피드백을 보내실 수 있습니다.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"zh-Hans":{"meta":{"langName":"简体中文","selectLabel":"语言","updatedLabel":"最后更新","updatedDate":"2026年5月15日"},"sections":[{"icon":"📋","title":"介绍","html":"<p>本隐私政策适用于由 Flying Dev Lab 开发的 iOS 应用 <strong>PriceWise（単価比べ）</strong>。</p><p>请在使用本应用之前阅读本政策。</p>"},{"icon":"💾","title":"存储在设备上的数据","html":"<div class='zero-data'><p>🔒 您的数据仅存储在您的设备上，从不发送到我们的服务器。</p></div><ul><li>比较会话数据（价格、数量、名称、备注）</li><li>购物备忘录</li><li>主题偏好（所选颜色方案）</li></ul><p>删除应用将从您的设备中移除所有这些数据。</p>"},{"icon":"📢","title":"广告（Google AdMob）","html":"<p>本应用通过 <strong>Google AdMob</strong>（Google LLC）向免费用户展示广告。AdMob 可能收集：</p><ul><li>广告标识符（IDFA）— 仅在获得 App Tracking Transparency 权限时</li><li>大致位置（根据 IP 地址估算）</li><li>崩溃日志和性能数据</li><li>广告展示和互动数据</li></ul><p>详情请参阅 <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google 隐私政策</a>。</p><p>购买「移除广告」将完全停止 AdMob 广告投放。</p>"},{"icon":"🛒","title":"应用内购买","html":"<p>本应用提供一次性购买「移除广告」。</p><p>所有付款均通过 Apple（App Store）处理。我们不会收到您的付款信息或个人信息。请参阅 <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apple 隐私政策</a>。</p>"},{"icon":"🔒","title":"信息共享","html":"<p>除法律要求外，我们不会向第三方出售或共享用户信息。</p><p>本应用使用 Google AdMob SDK。AdMob 收集的数据将传输至 Google LLC 的服务器。详情请参阅「广告」部分。</p>"},{"icon":"⚖️","title":"适用法律","html":"<p>本政策受日本法律管辖。任何争议均受开发者所在地有管辖权的法院专属管辖。</p>"},{"icon":"⚠️","title":"免责声明","html":"<p>虽然本应用致力于提供准确的计算结果，但我们不保证其完整性或准确性。请将所有结果仅作为参考信息使用。</p><p>iOS 更新或设备环境变化可能在未经事先通知的情况下影响应用功能。</p><p>开发者可能在未经事先通知的情况下终止或修改应用。</p>"},{"icon":"🔄","title":"政策变更","html":"<p>我们可能随时更新本政策。变更在本页面发布时生效。重大变更将在应用内通知。</p>"},{"icon":"📬","title":"联系方式","html":"<p>您可以通过 <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a> 的联系表单匿名发送反馈。</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"zh-Hant":{"meta":{"langName":"繁體中文","selectLabel":"語言","updatedLabel":"最後更新","updatedDate":"2026年5月15日"},"sections":[{"icon":"📋","title":"介紹","html":"<p>本隱私權政策適用於由 Flying Dev Lab 開發的 iOS 應用程式 <strong>PriceWise（単価比べ）</strong>。</p><p>請在使用本應用程式之前閱讀本政策。</p>"},{"icon":"💾","title":"儲存在裝置上的資料","html":"<div class='zero-data'><p>🔒 您的資料僅儲存在您的裝置上，從不傳送至我們的伺服器。</p></div><ul><li>比較作業資料（價格、數量、名稱、備註）</li><li>購物備忘錄</li><li>主題偏好（所選色彩配置）</li></ul><p>刪除應用程式將從您的裝置移除所有這些資料。</p>"},{"icon":"📢","title":"廣告（Google AdMob）","html":"<p>本應用程式透過 <strong>Google AdMob</strong>（Google LLC）向免費用戶顯示廣告。AdMob 可能收集：</p><ul><li>廣告識別碼（IDFA）— 僅在取得 App Tracking Transparency 權限時</li><li>大致位置（根據 IP 位址估算）</li><li>當機記錄與效能資料</li><li>廣告曝光與互動資料</li></ul><p>詳情請參閱 <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google 隱私權政策</a>。</p><p>購買「移除廣告」將完全停止 AdMob 廣告投放。</p>"},{"icon":"🛒","title":"應用程式內購買","html":"<p>本應用程式提供一次性購買「移除廣告」。</p><p>所有付款均透過 Apple（App Store）處理。我們不會收到您的付款資訊或個人資訊。請參閱 <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apple 隱私權政策</a>。</p>"},{"icon":"🔒","title":"資訊共享","html":"<p>除法律要求外，我們不會向第三方出售或共享用戶資訊。</p><p>本應用程式使用 Google AdMob SDK。AdMob 收集的資料將傳輸至 Google LLC 的伺服器。詳情請參閱「廣告」部分。</p>"},{"icon":"⚖️","title":"適用法律","html":"<p>本政策受日本法律管轄。任何爭議均受開發者所在地有管轄權的法院專屬管轄。</p>"},{"icon":"⚠️","title":"免責聲明","html":"<p>雖然本應用程式致力於提供準確的計算結果，但我們不保證其完整性或準確性。請將所有結果僅作為參考資訊使用。</p><p>iOS 更新或裝置環境變化可能在未事先通知的情況下影響應用程式功能。</p><p>開發者可能在未事先通知的情況下終止或修改應用程式。</p>"},{"icon":"🔄","title":"政策變更","html":"<p>我們可能隨時更新本政策。變更在本頁面發布時生效。重大變更將在應用程式內通知。</p>"},{"icon":"📬","title":"聯絡方式","html":"<p>您可以透過 <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a> 的聯絡表單匿名傳送意見。</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"da":{"meta":{"langName":"Dansk","selectLabel":"Sprog","updatedLabel":"Sidst opdateret","updatedDate":"15. maj 2026"},"sections":[{"icon":"📋","title":"Introduktion","html":"<p>Dette er privatlivspolitikken for <strong>PriceWise (単価比べ)</strong>, en iOS-app udviklet af Flying Dev Lab.</p><p>Læs venligst denne politik, inden du bruger appen.</p>"},{"icon":"💾","title":"Data gemt på din enhed","html":"<div class='zero-data'><p>🔒 Dine data gemmes kun på din enhed og sendes aldrig til vores servere.</p></div><ul><li>Sammenligningsdata (pris, mængde, navn, note)</li><li>Indkøbsliste</li><li>Temapræference (valgt farveskema)</li></ul><p>Sletning af appen fjerner alle disse data fra din enhed.</p>"},{"icon":"📢","title":"Annoncering (Google AdMob)","html":"<p>Appen viser annoncer via <strong>Google AdMob</strong> (Google LLC) for gratis brugere. AdMob kan indsamle:</p><ul><li>Annonce-id (IDFA) — kun hvis tilladelse til App Tracking Transparency er givet</li><li>Omtrentlig placering (estimeret fra IP-adresse)</li><li>Nedbrudslogs og ydeevnedata</li><li>Annoncevisninger og interaktionsdata</li></ul><p>Se <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Googles privatlivspolitik</a> for detaljer.</p><p>Køb af «Fjern annoncer» stopper fuldstændigt AdMob-annoncering.</p>"},{"icon":"🛒","title":"Køb i appen","html":"<p>Appen tilbyder et engangskøb «Fjern annoncer».</p><p>Al betalingsbehandling sker via Apple (App Store). Vi modtager ikke dine betalings- eller personlige oplysninger. Se <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apples privatlivspolitik</a>.</p>"},{"icon":"🔒","title":"Deling af oplysninger","html":"<p>Vi sælger eller deler ikke brugeroplysninger med tredjeparter, medmindre det er påkrævet af loven.</p><p>Appen bruger Google AdMob SDK. Data indsamlet af AdMob overføres til Google LLCs servere. Se afsnittet «Annoncering».</p>"},{"icon":"⚖️","title":"Gældende lov","html":"<p>Denne politik er underlagt japansk lovgivning. Eventuelle tvister er underlagt den eksklusive jurisdiktion af domstolene på udviklerens placering.</p>"},{"icon":"⚠️","title":"Ansvarsfraskrivelse","html":"<p>Selvom appen bestræber sig på at give nøjagtige beregningsresultater, garanterer vi ikke deres fuldstændighed eller nøjagtighed. Behandl alle resultater kun som referenceinformation.</p><p>iOS-opdateringer kan påvirke appens funktionalitet uden forudgående varsel.</p><p>Udvikleren kan afslutte eller ændre appen uden forudgående varsel.</p>"},{"icon":"🔄","title":"Ændringer i denne politik","html":"<p>Vi kan opdatere denne politik til enhver tid. Ændringer træder i kraft, når de offentliggøres. Væsentlige ændringer vil blive meddelt i appen.</p>"},{"icon":"📬","title":"Kontakt","html":"<p>Du kan sende anonyme tilbagemeldinger via kontaktformularen på <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"nb":{"meta":{"langName":"Norsk bokmål","selectLabel":"Språk","updatedLabel":"Sist oppdatert","updatedDate":"15. mai 2026"},"sections":[{"icon":"📋","title":"Innledning","html":"<p>Dette er personvernerklæringen for <strong>PriceWise (単価比べ)</strong>, en iOS-app utviklet av Flying Dev Lab.</p><p>Les denne erklæringen før du bruker appen.</p>"},{"icon":"💾","title":"Data lagret på enheten din","html":"<div class='zero-data'><p>🔒 Dataene dine lagres kun på enheten din og sendes aldri til våre servere.</p></div><ul><li>Sammenligningsdata (pris, mengde, navn, notat)</li><li>Handleliste</li><li>Temapreferanse (valgt fargevalg)</li></ul><p>Sletting av appen fjerner alle disse dataene.</p>"},{"icon":"📢","title":"Annonsering (Google AdMob)","html":"<p>Appen viser annoncer via <strong>Google AdMob</strong> (Google LLC) for gratisbrukere. AdMob kan samle inn:</p><ul><li>Annonse-ID (IDFA) — kun hvis tillatelse til App Tracking Transparency er gitt</li><li>Omtrentlig plassering (estimert fra IP-adresse)</li><li>Krasjlogger og ytelsesdata</li><li>Annonsevisninger og interaksjonsdata</li></ul><p>Se <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Googles personvernerklæring</a> for detaljer.</p><p>Kjøp av «Fjern annonser» stopper all AdMob-annonsering.</p>"},{"icon":"🛒","title":"Kjøp i appen","html":"<p>Appen tilbyr et engangskjøp «Fjern annonser».</p><p>All betalingsbehandling skjer via Apple (App Store). Vi mottar ikke betalingsinformasjonen din eller personopplysninger. Se <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apples personvernerklæring</a>.</p>"},{"icon":"🔒","title":"Deling av informasjon","html":"<p>Vi selger eller deler ikke brukerinformasjon med tredjeparter, unntatt når det er påkrevd av loven.</p><p>Appen bruker Google AdMob SDK. Data samlet inn av AdMob overføres til Google LLCs servere. Se delen «Annonsering».</p>"},{"icon":"⚖️","title":"Gjeldende lov","html":"<p>Denne erklæringen er underlagt japansk lov. Eventuelle tvister er underlagt den eksklusive jurisdiksjonen til domstolene på utviklerens sted.</p>"},{"icon":"⚠️","title":"Ansvarsfraskrivelse","html":"<p>Selv om appen bestreber seg på å gi nøyaktige beregningsresultater, garanterer vi ikke deres fullstendighet eller nøyaktighet. Behandl alle resultater kun som referanseinformasjon.</p><p>iOS-oppdateringer kan påvirke appens funksjonalitet uten forhåndsvarsel.</p><p>Utvikleren kan avslutte eller endre appen uten forhåndsvarsel.</p>"},{"icon":"🔄","title":"Endringer i denne erklæringen","html":"<p>Vi kan oppdatere denne erklæringen når som helst. Endringer trer i kraft når de publiseres. Vesentlige endringer vil bli varslet i appen.</p>"},{"icon":"📬","title":"Kontakt","html":"<p>Du kan sende anonym tilbakemelding via kontaktskjemaet på <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"sv":{"meta":{"langName":"Svenska","selectLabel":"Språk","updatedLabel":"Senast uppdaterad","updatedDate":"15 maj 2026"},"sections":[{"icon":"📋","title":"Introduktion","html":"<p>Detta är integritetspolicyn för <strong>PriceWise (単価比べ)</strong>, en iOS-app utvecklad av Flying Dev Lab.</p><p>Läs denna policy innan du använder appen.</p>"},{"icon":"💾","title":"Data som lagras på din enhet","html":"<div class='zero-data'><p>🔒 Dina data lagras bara på din enhet och skickas aldrig till våra servrar.</p></div><ul><li>Jämförelsedata (pris, mängd, namn, anteckning)</li><li>Inköpslista</li><li>Temainställning (valt färgschema)</li></ul><p>Om du tar bort appen raderas all denna data från din enhet.</p>"},{"icon":"📢","title":"Annonsering (Google AdMob)","html":"<p>Appen visar annonser via <strong>Google AdMob</strong> (Google LLC) för gratisanvändare. AdMob kan samla in:</p><ul><li>Annons-ID (IDFA) — endast om App Tracking Transparency-tillstånd ges</li><li>Ungefärlig plats (uppskattad från IP-adress)</li><li>Kraschloggar och prestandadata</li><li>Annonsvisningar och interaktionsdata</li></ul><p>Se <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Googles integritetspolicy</a> för detaljer.</p><p>Köp av «Ta bort annonser» stoppar helt AdMob-annonsering.</p>"},{"icon":"🛒","title":"Köp i appen","html":"<p>Appen erbjuder ett engångsköp «Ta bort annonser».</p><p>All betalningshantering sköts av Apple (App Store). Vi tar inte emot dina betalningsuppgifter eller personlig information. Se <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apples integritetspolicy</a>.</p>"},{"icon":"🔒","title":"Delning av information","html":"<p>Vi säljer inte eller delar användarinformation med tredje part, förutom när det krävs enligt lag.</p><p>Appen använder Google AdMob SDK. Data som samlas in av AdMob överförs till Google LLCs servrar. Se avsnittet «Annonsering».</p>"},{"icon":"⚖️","title":"Tillämplig lag","html":"<p>Denna policy regleras av japansk lag. Eventuella tvister är underkastade den exklusiva jurisdiktionen hos domstolarna på utvecklarens plats.</p>"},{"icon":"⚠️","title":"Ansvarsfriskrivning","html":"<p>Även om appen strävar efter att ge korrekta beräkningsresultat, garanterar vi inte deras fullständighet eller noggrannhet. Behandla alla resultat enbart som referensinformation.</p><p>iOS-uppdateringar kan påverka appens funktionalitet utan föregående meddelande.</p><p>Utvecklaren kan avsluta eller ändra appen utan föregående meddelande.</p>"},{"icon":"🔄","title":"Ändringar i denna policy","html":"<p>Vi kan uppdatera denna policy när som helst. Ändringar träder i kraft när de publiceras. Väsentliga ändringar meddelas i appen.</p>"},{"icon":"📬","title":"Kontakt","html":"<p>Du kan skicka anonym feedback via kontaktformuläret på <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"fi":{"meta":{"langName":"Suomi","selectLabel":"Kieli","updatedLabel":"Viimeksi päivitetty","updatedDate":"15. toukokuuta 2026"},"sections":[{"icon":"📋","title":"Johdanto","html":"<p>Tämä on <strong>PriceWise (単価比べ)</strong> -sovelluksen tietosuojakäytäntö. Flying Dev Lab on kehittänyt sovelluksen iOS-alustalle.</p><p>Lue tämä käytäntö ennen sovelluksen käyttöä.</p>"},{"icon":"💾","title":"Laitteelle tallennetut tiedot","html":"<div class='zero-data'><p>🔒 Tietosi tallennetaan vain laitteellesi eikä niitä koskaan lähetetä palvelimillemme.</p></div><ul><li>Vertailutiedot (hinta, määrä, nimi, muistiinpano)</li><li>Ostoslista</li><li>Teemaasetus (valittu värimaailma)</li></ul><p>Sovelluksen poistaminen poistaa kaikki nämä tiedot laitteeltasi.</p>"},{"icon":"📢","title":"Mainonta (Google AdMob)","html":"<p>Sovellus näyttää mainoksia <strong>Google AdMob</strong> (Google LLC) -palvelun kautta ilmaisille käyttäjille. AdMob voi kerätä:</p><ul><li>Mainostunniste (IDFA) — vain jos App Tracking Transparency -lupa on myönnetty</li><li>Likimääräinen sijainti (arvioitu IP-osoitteesta)</li><li>Kaatumiset ja suorituskykytiedot</li><li>Mainosnäytöt ja vuorovaikutustiedot</li></ul><p>Katso <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Googlen tietosuojakäytäntö</a> lisätietoja varten.</p><p>Ostamalla «Poista mainokset» poistat AdMob-mainonnan kokonaan.</p>"},{"icon":"🛒","title":"Sovelluksen sisäiset ostokset","html":"<p>Sovellus tarjoaa kertaoston «Poista mainokset».</p><p>Apple (App Store) käsittelee kaikki maksut. Emme vastaanota maksutietojasi tai henkilökohtaisia tietojasi. Katso <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Applen tietosuojakäytäntö</a>.</p>"},{"icon":"🔒","title":"Tietojen jakaminen","html":"<p>Emme myy tai jaa käyttäjätietoja kolmansille osapuolille, paitsi lain vaatiessa.</p><p>Sovellus käyttää Google AdMob SDK:ta. AdMobin keräämät tiedot lähetetään Google LLC:n palvelimille. Katso «Mainonta»-osio.</p>"},{"icon":"⚖️","title":"Sovellettava laki","html":"<p>Tätä käytäntöä hallitsee Japanin laki. Kaikki riidat ovat kehittäjän sijaintipaikan tuomioistuinten yksinomaisen toimivallan alaisia.</p>"},{"icon":"⚠️","title":"Vastuuvapauslauseke","html":"<p>Vaikka sovellus pyrkii tarjoamaan tarkkoja tuloksia, emme takaa niiden täydellisyyttä tai tarkkuutta. Käsittele kaikkia tuloksia vain viitetietona.</p><p>iOS-päivitykset voivat vaikuttaa sovelluksen toimintaan ilman ennakkoilmoitusta.</p><p>Kehittäjä voi lopettaa tai muuttaa sovellusta ilman ennakkoilmoitusta.</p>"},{"icon":"🔄","title":"Muutokset tähän käytäntöön","html":"<p>Voimme päivittää tätä käytäntöä milloin tahansa. Muutokset tulevat voimaan, kun ne julkaistaan. Merkittävistä muutoksista ilmoitetaan sovelluksessa.</p>"},{"icon":"📬","title":"Yhteydenotto","html":"<p>Voit lähettää anonyymin palautteen <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a> -sivuston yhteydenottolomakkeen kautta.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"nl":{"meta":{"langName":"Nederlands","selectLabel":"Taal","updatedLabel":"Laatst bijgewerkt","updatedDate":"15 mei 2026"},"sections":[{"icon":"📋","title":"Introductie","html":"<p>Dit is het privacybeleid van <strong>PriceWise (単価比べ)</strong>, een iOS-app ontwikkeld door Flying Dev Lab.</p><p>Lees dit beleid voordat u de app gebruikt.</p>"},{"icon":"💾","title":"Gegevens opgeslagen op uw apparaat","html":"<div class='zero-data'><p>🔒 Uw gegevens worden alleen op uw apparaat opgeslagen en nooit naar onze servers verzonden.</p></div><ul><li>Vergelijkingsgegevens (prijs, hoeveelheid, naam, notitie)</li><li>Boodschappenlijst</li><li>Themavoorkeur (geselecteerd kleurenschema)</li></ul><p>Het verwijderen van de app verwijdert al deze gegevens van uw apparaat.</p>"},{"icon":"📢","title":"Advertenties (Google AdMob)","html":"<p>De app toont advertenties via <strong>Google AdMob</strong> (Google LLC) voor gratis gebruikers. AdMob kan het volgende verzamelen:</p><ul><li>Advertentie-id (IDFA) — alleen als App Tracking Transparency-toestemming is verleend</li><li>Geschatte locatie (geschat op basis van IP-adres)</li><li>Crashlogboeken en prestatiegegevens</li><li>Advertentieweergaven en interactiegegevens</li></ul><p>Zie het <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>privacybeleid van Google</a> voor details.</p><p>Aankoop van «Advertenties verwijderen» stopt AdMob-advertenties volledig.</p>"},{"icon":"🛒","title":"In-app aankopen","html":"<p>De app biedt een eenmalige aankoop «Advertenties verwijderen».</p><p>Alle betalingen worden verwerkt door Apple (App Store). Wij ontvangen uw betalingsgegevens of persoonlijke informatie niet. Zie het <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>privacybeleid van Apple</a>.</p>"},{"icon":"🔒","title":"Delen van informatie","html":"<p>Wij verkopen of delen geen gebruikersinformatie met derden, tenzij wettelijk vereist.</p><p>De app gebruikt de Google AdMob SDK. Door AdMob verzamelde gegevens worden verzonden naar de servers van Google LLC. Zie de sectie «Advertenties».</p>"},{"icon":"⚖️","title":"Toepasselijk recht","html":"<p>Dit beleid wordt beheerst door het Japanse recht. Geschillen vallen onder de exclusieve bevoegdheid van de rechtbanken op de locatie van de ontwikkelaar.</p>"},{"icon":"⚠️","title":"Disclaimer","html":"<p>Hoewel de app streeft naar nauwkeurige berekeningen, garanderen wij de volledigheid of nauwkeurigheid niet. Behandel alle resultaten alleen als referentie-informatie.</p><p>iOS-updates kunnen de werking van de app beïnvloeden zonder voorafgaande kennisgeving.</p><p>De ontwikkelaar kan de app beëindigen of wijzigen zonder voorafgaande kennisgeving.</p>"},{"icon":"🔄","title":"Wijzigingen in dit beleid","html":"<p>Wij kunnen dit beleid op elk moment bijwerken. Wijzigingen treden in werking bij publicatie. Significante wijzigingen worden gemeld in de app.</p>"},{"icon":"📬","title":"Contact","html":"<p>U kunt anonieme feedback sturen via het contactformulier op <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"pl":{"meta":{"langName":"Polski","selectLabel":"Język","updatedLabel":"Ostatnia aktualizacja","updatedDate":"15 maja 2026"},"sections":[{"icon":"📋","title":"Wprowadzenie","html":"<p>Niniejsza polityka prywatności dotyczy aplikacji <strong>PriceWise (単価比べ)</strong>, aplikacji iOS stworzonej przez Flying Dev Lab.</p><p>Przeczytaj tę politykę przed skorzystaniem z aplikacji.</p>"},{"icon":"💾","title":"Dane przechowywane na urządzeniu","html":"<div class='zero-data'><p>🔒 Twoje dane są przechowywane wyłącznie na Twoim urządzeniu i nigdy nie są wysyłane na nasze serwery.</p></div><ul><li>Dane porównawcze (cena, ilość, nazwa, notatka)</li><li>Lista zakupów</li><li>Preferencja motywu (wybrany schemat kolorów)</li></ul><p>Usunięcie aplikacji usuwa wszystkie te dane z Twojego urządzenia.</p>"},{"icon":"📢","title":"Reklamy (Google AdMob)","html":"<p>Aplikacja wyświetla reklamy za pośrednictwem <strong>Google AdMob</strong> (Google LLC) dla darmowych użytkowników. AdMob może zbierać:</p><ul><li>Identyfikator reklamowy (IDFA) — tylko jeśli udzielono zgody na App Tracking Transparency</li><li>Przybliżona lokalizacja (oszacowana na podstawie adresu IP)</li><li>Dzienniki awarii i dane wydajności</li><li>Wyświetlenia reklam i dane interakcji</li></ul><p>Więcej informacji w <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Polityce prywatności Google</a>.</p><p>Zakup «Usuń reklamy» całkowicie zatrzymuje reklamy AdMob.</p>"},{"icon":"🛒","title":"Zakupy w aplikacji","html":"<p>Aplikacja oferuje jednorazowy zakup «Usuń reklamy».</p><p>Wszystkie płatności są przetwarzane przez Apple (App Store). Nie otrzymujemy Twoich danych płatniczych ani osobowych. Zobacz <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Politykę prywatności Apple</a>.</p>"},{"icon":"🔒","title":"Udostępnianie informacji","html":"<p>Nie sprzedajemy ani nie udostępniamy informacji o użytkownikach stronom trzecim, z wyjątkiem przypadków wymaganych przez prawo.</p><p>Aplikacja używa Google AdMob SDK. Dane zebrane przez AdMob są przesyłane na serwery Google LLC. Szczegóły w sekcji «Reklamy».</p>"},{"icon":"⚖️","title":"Prawo właściwe","html":"<p>Niniejsza polityka podlega prawu japońskiemu. Wszelkie spory podlegają wyłącznej jurysdykcji sądów właściwych dla miejsca siedziby dewelopera.</p>"},{"icon":"⚠️","title":"Wyłączenie odpowiedzialności","html":"<p>Mimo że aplikacja stara się dostarczać dokładne wyniki obliczeń, nie gwarantujemy ich kompletności ani dokładności. Traktuj wszystkie wyniki wyłącznie jako informacje orientacyjne.</p><p>Aktualizacje iOS mogą wpływać na działanie aplikacji bez uprzedniego powiadomienia.</p><p>Deweloper może zakończyć lub zmienić aplikację bez uprzedniego powiadomienia.</p>"},{"icon":"🔄","title":"Zmiany w tej polityce","html":"<p>Możemy aktualizować tę politykę w dowolnym czasie. Zmiany wchodzą w życie z chwilą opublikowania. O istotnych zmianach poinformujemy w aplikacji.</p>"},{"icon":"📬","title":"Kontakt","html":"<p>Możesz wysłać anonimową opinię przez formularz kontaktowy na <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"ru":{"meta":{"langName":"Русский","selectLabel":"Язык","updatedLabel":"Последнее обновление","updatedDate":"15 мая 2026 г."},"sections":[{"icon":"📋","title":"Введение","html":"<p>Настоящая политика конфиденциальности относится к приложению <strong>PriceWise (単価比べ)</strong>, iOS-приложению, разработанному Flying Dev Lab.</p><p>Пожалуйста, ознакомьтесь с этой политикой перед использованием приложения.</p>"},{"icon":"💾","title":"Данные, хранящиеся на устройстве","html":"<div class='zero-data'><p>🔒 Ваши данные хранятся только на вашем устройстве и никогда не отправляются на наши серверы.</p></div><ul><li>Данные сравнения (цена, количество, название, заметка)</li><li>Список покупок</li><li>Настройка темы (выбранная цветовая схема)</li></ul><p>Удаление приложения удаляет все эти данные с вашего устройства.</p>"},{"icon":"📢","title":"Реклама (Google AdMob)","html":"<p>Приложение показывает рекламу через <strong>Google AdMob</strong> (Google LLC) для бесплатных пользователей. AdMob может собирать:</p><ul><li>Идентификатор рекламы (IDFA) — только при наличии разрешения App Tracking Transparency</li><li>Приблизительное местоположение (по IP-адресу)</li><li>Журналы сбоев и данные о производительности</li><li>Показы рекламы и данные о взаимодействии</li></ul><p>Подробности см. в <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Политике конфиденциальности Google</a>.</p><p>Покупка «Отключить рекламу» полностью останавливает показ рекламы AdMob.</p>"},{"icon":"🛒","title":"Покупки в приложении","html":"<p>Приложение предлагает единовременную покупку «Отключить рекламу».</p><p>Все платежи обрабатываются Apple (App Store). Мы не получаем ваши платёжные данные или личную информацию. См. <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Политику конфиденциальности Apple</a>.</p>"},{"icon":"🔒","title":"Передача информации","html":"<p>Мы не продаём и не передаём пользовательские данные третьим лицам, кроме случаев, предусмотренных законом.</p><p>Приложение использует Google AdMob SDK. Данные, собранные AdMob, передаются на серверы Google LLC. Подробности — в разделе «Реклама».</p>"},{"icon":"⚖️","title":"Применимое право","html":"<p>Настоящая политика регулируется законодательством Японии. Все споры подпадают под исключительную юрисдикцию судов по месту нахождения разработчика.</p>"},{"icon":"⚠️","title":"Отказ от ответственности","html":"<p>Хотя приложение стремится предоставлять точные результаты расчётов, мы не гарантируем их полноты или точности. Рассматривайте все результаты исключительно как справочную информацию.</p><p>Обновления iOS могут повлиять на работу приложения без предупреждения.</p><p>Разработчик может прекратить или изменить работу приложения без предварительного уведомления.</p>"},{"icon":"🔄","title":"Изменения в этой политике","html":"<p>Мы можем обновлять эту политику в любое время. Изменения вступают в силу с момента их публикации. О существенных изменениях будет сообщено в приложении.</p>"},{"icon":"📬","title":"Контакты","html":"<p>Вы можете отправить анонимный отзыв через форму обратной связи на <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"tr":{"meta":{"langName":"Türkçe","selectLabel":"Dil","updatedLabel":"Son güncelleme","updatedDate":"15 Mayıs 2026"},"sections":[{"icon":"📋","title":"Giriş","html":"<p>Bu, Flying Dev Lab tarafından geliştirilen bir iOS uygulaması olan <strong>PriceWise (単価比べ)</strong> için Gizlilik Politikasıdır.</p><p>Lütfen uygulamayı kullanmadan önce bu politikayı okuyun.</p>"},{"icon":"💾","title":"Cihazınızda Depolanan Veriler","html":"<div class='zero-data'><p>🔒 Verileriniz yalnızca cihazınızda saklanır ve sunucularımıza hiçbir zaman gönderilmez.</p></div><ul><li>Karşılaştırma verileri (fiyat, miktar, ad, not)</li><li>Alışveriş listesi</li><li>Tema tercihi (seçilen renk şeması)</li></ul><p>Uygulamayı silmek bu verilerin tümünü cihazınızdan kaldırır.</p>"},{"icon":"📢","title":"Reklamcılık (Google AdMob)","html":"<p>Uygulama, ücretsiz kullanıcılar için <strong>Google AdMob</strong> (Google LLC) aracılığıyla reklamlar gösterir. AdMob şunları toplayabilir:</p><ul><li>Reklam tanımlayıcısı (IDFA) — yalnızca App Tracking Transparency izni verilmişse</li><li>Yaklaşık konum (IP adresinden tahmin edilir)</li><li>Kilitlenme günlükleri ve performans verileri</li><li>Reklam gösterimleri ve etkileşim verileri</li></ul><p>Ayrıntılar için <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google Gizlilik Politikası</a>'na bakın.</p><p>«Reklamları Kaldır» satın almak AdMob reklamlarını tamamen durdurur.</p>"},{"icon":"🛒","title":"Uygulama İçi Satın Almalar","html":"<p>Uygulama, tek seferlik «Reklamları Kaldır» satın alımı sunar.</p><p>Tüm ödemeler Apple (App Store) tarafından işlenir. Ödeme veya kişisel bilgilerinizi almayız. <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Apple Gizlilik Politikası</a>'na bakın.</p>"},{"icon":"🔒","title":"Bilgilerin Paylaşılması","html":"<p>Yasa tarafından zorunlu kılınmadıkça kullanıcı bilgilerini üçüncü taraflarla satmaz veya paylaşmayız.</p><p>Uygulama, reklamcılık için Google AdMob SDK kullanır. AdMob tarafından toplanan veriler Google LLC sunucularına iletilir. Ayrıntılar için «Reklamcılık» bölümüne bakın.</p>"},{"icon":"⚖️","title":"Geçerli Hukuk","html":"<p>Bu politika Japonya yasalarına tabidir. Her türlü anlaşmazlık, geliştiricinin bulunduğu yerdeki mahkemelerin münhasır yargı yetkisine tabi olacaktır.</p>"},{"icon":"⚠️","title":"Sorumluluk Reddi","html":"<p>Uygulama doğru hesaplama sonuçları sağlamaya çalışsa da bunların eksiksizliğini veya doğruluğunu garanti etmeyiz. Tüm sonuçları yalnızca referans bilgisi olarak değerlendirin.</p><p>iOS güncellemeleri uygulamanın işlevselliğini önceden haber verilmeksizin etkileyebilir.</p><p>Geliştirici, uygulamayı önceden haber vermeksizin sonlandırabilir veya değiştirebilir.</p>"},{"icon":"🔄","title":"Bu Politikadaki Değişiklikler","html":"<p>Bu politikayı istediğimiz zaman güncelleyebiliriz. Değişiklikler, bu sayfada yayınlandığında yürürlüğe girer. Önemli değişiklikler uygulamada bildirilir.</p>"},{"icon":"📬","title":"İletişim","html":"<p><a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a> üzerindeki iletişim formu aracılığıyla anonim geri bildirim gönderebilirsiniz.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"th":{"meta":{"langName":"ภาษาไทย","selectLabel":"ภาษา","updatedLabel":"อัปเดตล่าสุด","updatedDate":"15 พฤษภาคม 2026"},"sections":[{"icon":"📋","title":"บทนำ","html":"<p>นโยบายความเป็นส่วนตัวนี้ใช้สำหรับ <strong>PriceWise (単価比べ)</strong> แอป iOS ที่พัฒนาโดย Flying Dev Lab</p><p>โปรดอ่านนโยบายนี้ก่อนใช้แอป</p>"},{"icon":"💾","title":"ข้อมูลที่เก็บไว้ในอุปกรณ์","html":"<div class='zero-data'><p>🔒 ข้อมูลของคุณจัดเก็บไว้เฉพาะในอุปกรณ์และไม่เคยส่งไปยังเซิร์ฟเวอร์ของเรา</p></div><ul><li>ข้อมูลการเปรียบเทียบ (ราคา จำนวน ชื่อ บันทึก)</li><li>รายการช้อปปิ้ง</li><li>ค่ากำหนดธีม (รูปแบบสีที่เลือก)</li></ul><p>การลบแอปจะลบข้อมูลทั้งหมดออกจากอุปกรณ์</p>"},{"icon":"📢","title":"การโฆษณา (Google AdMob)","html":"<p>แอปแสดงโฆษณาผ่าน <strong>Google AdMob</strong> (Google LLC) สำหรับผู้ใช้ฟรี AdMob อาจรวบรวม:</p><ul><li>ตัวระบุโฆษณา (IDFA) — เฉพาะเมื่อได้รับอนุญาต App Tracking Transparency</li><li>ตำแหน่งโดยประมาณ (ประมาณจากที่อยู่ IP)</li><li>บันทึกข้อขัดข้องและข้อมูลประสิทธิภาพ</li><li>การแสดงโฆษณาและข้อมูลการโต้ตอบ</li></ul><p>ดูรายละเอียดใน <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>นโยบายความเป็นส่วนตัวของ Google</a></p><p>การซื้อ «ลบโฆษณา» จะหยุดโฆษณา AdMob ทั้งหมด</p>"},{"icon":"🛒","title":"การซื้อในแอป","html":"<p>แอปเสนอการซื้อครั้งเดียว «ลบโฆษณา»</p><p>การชำระเงินทั้งหมดดำเนินการโดย Apple (App Store) เราไม่ได้รับข้อมูลการชำระเงินหรือข้อมูลส่วนตัวของคุณ ดู <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>นโยบายความเป็นส่วนตัวของ Apple</a></p>"},{"icon":"🔒","title":"การแบ่งปันข้อมูล","html":"<p>เราไม่ขายหรือแบ่งปันข้อมูลผู้ใช้กับบุคคลที่สาม ยกเว้นที่กฎหมายกำหนด</p><p>แอปใช้ Google AdMob SDK ข้อมูลที่รวบรวมโดย AdMob จะถูกส่งไปยังเซิร์ฟเวอร์ของ Google LLC ดูรายละเอียดในส่วน «การโฆษณา»</p>"},{"icon":"⚖️","title":"กฎหมายที่ใช้บังคับ","html":"<p>นโยบายนี้อยู่ภายใต้กฎหมายของญี่ปุ่น ข้อพิพาทใดๆ อยู่ภายใต้อำนาจศาลแต่เพียงผู้เดียวของศาลที่มีอำนาจในสถานที่ของผู้พัฒนา</p>"},{"icon":"⚠️","title":"ข้อจำกัดความรับผิดชอบ","html":"<p>แม้ว่าแอปจะพยายามให้ผลการคำนวณที่ถูกต้อง แต่เราไม่รับประกันความสมบูรณ์หรือความถูกต้อง โปรดถือว่าผลลัพธ์ทั้งหมดเป็นข้อมูลอ้างอิงเท่านั้น</p><p>การอัปเดต iOS อาจส่งผลต่อฟังก์ชันการทำงานของแอปโดยไม่แจ้งให้ทราบล่วงหน้า</p><p>ผู้พัฒนาอาจยุติหรือแก้ไขแอปโดยไม่แจ้งให้ทราบล่วงหน้า</p>"},{"icon":"🔄","title":"การเปลี่ยนแปลงนโยบายนี้","html":"<p>เราอาจอัปเดตนโยบายนี้ได้ตลอดเวลา การเปลี่ยนแปลงมีผลเมื่อเผยแพร่บนหน้านี้ การเปลี่ยนแปลงสำคัญจะได้รับการแจ้งเตือนในแอป</p>"},{"icon":"📬","title":"ติดต่อ","html":"<p>คุณสามารถส่งความคิดเห็นแบบไม่ระบุตัวตนผ่านแบบฟอร์มติดต่อที่ <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a></p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"id":{"meta":{"langName":"Bahasa Indonesia","selectLabel":"Bahasa","updatedLabel":"Terakhir diperbarui","updatedDate":"15 Mei 2026"},"sections":[{"icon":"📋","title":"Pendahuluan","html":"<p>Ini adalah Kebijakan Privasi untuk <strong>PriceWise (単価比べ)</strong>, aplikasi iOS yang dikembangkan oleh Flying Dev Lab.</p><p>Harap baca kebijakan ini sebelum menggunakan aplikasi.</p>"},{"icon":"💾","title":"Data yang Disimpan di Perangkat","html":"<div class='zero-data'><p>🔒 Data Anda hanya disimpan di perangkat Anda dan tidak pernah dikirim ke server kami.</p></div><ul><li>Data sesi perbandingan (harga, jumlah, nama, catatan)</li><li>Daftar belanja</li><li>Preferensi tema (skema warna yang dipilih)</li></ul><p>Menghapus aplikasi akan menghapus semua data ini dari perangkat Anda.</p>"},{"icon":"📢","title":"Iklan (Google AdMob)","html":"<p>Aplikasi menampilkan iklan melalui <strong>Google AdMob</strong> (Google LLC) untuk pengguna gratis. AdMob dapat mengumpulkan:</p><ul><li>Pengidentifikasi iklan (IDFA) — hanya jika izin App Tracking Transparency diberikan</li><li>Lokasi perkiraan (diperkirakan dari alamat IP)</li><li>Log kerusakan dan data kinerja</li><li>Tayangan iklan dan data interaksi</li></ul><p>Lihat <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Kebijakan Privasi Google</a> untuk detailnya.</p><p>Membeli «Hapus Iklan» sepenuhnya menghentikan penayangan iklan AdMob.</p>"},{"icon":"🛒","title":"Pembelian Dalam Aplikasi","html":"<p>Aplikasi menawarkan pembelian satu kali «Hapus Iklan».</p><p>Semua pembayaran diproses oleh Apple (App Store). Kami tidak menerima informasi pembayaran atau pribadi Anda. Lihat <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Kebijakan Privasi Apple</a>.</p>"},{"icon":"🔒","title":"Berbagi Informasi","html":"<p>Kami tidak menjual atau berbagi informasi pengguna dengan pihak ketiga, kecuali diwajibkan oleh hukum.</p><p>Aplikasi menggunakan Google AdMob SDK. Data yang dikumpulkan oleh AdMob dikirimkan ke server Google LLC. Lihat bagian «Iklan» untuk detailnya.</p>"},{"icon":"⚖️","title":"Hukum yang Berlaku","html":"<p>Kebijakan ini diatur oleh hukum Jepang. Setiap perselisihan tunduk pada yurisdiksi eksklusif pengadilan yang berwenang di lokasi pengembang.</p>"},{"icon":"⚠️","title":"Penafian","html":"<p>Meskipun aplikasi berupaya memberikan hasil perhitungan yang akurat, kami tidak menjamin kelengkapan atau keakuratannya. Perlakukan semua hasil hanya sebagai informasi referensi.</p><p>Pembaruan iOS dapat memengaruhi fungsionalitas aplikasi tanpa pemberitahuan sebelumnya.</p><p>Pengembang dapat menghentikan atau memodifikasi aplikasi tanpa pemberitahuan sebelumnya.</p>"},{"icon":"🔄","title":"Perubahan pada Kebijakan Ini","html":"<p>Kami dapat memperbarui kebijakan ini kapan saja. Perubahan berlaku saat diterbitkan di halaman ini. Perubahan signifikan akan diberitahukan dalam aplikasi.</p>"},{"icon":"📬","title":"Kontak","html":"<p>Anda dapat mengirim umpan balik anonim melalui formulir kontak di <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"ms":{"meta":{"langName":"Bahasa Melayu","selectLabel":"Bahasa","updatedLabel":"Dikemaskini pada","updatedDate":"15 Mei 2026"},"sections":[{"icon":"📋","title":"Pendahuluan","html":"<p>Ini adalah Dasar Privasi untuk <strong>PriceWise (単価比べ)</strong>, aplikasi iOS yang dibangunkan oleh Flying Dev Lab.</p><p>Sila baca dasar ini sebelum menggunakan aplikasi.</p>"},{"icon":"💾","title":"Data yang Disimpan di Peranti","html":"<div class='zero-data'><p>🔒 Data anda hanya disimpan di peranti anda dan tidak pernah dihantar ke pelayan kami.</p></div><ul><li>Data sesi perbandingan (harga, kuantiti, nama, nota)</li><li>Senarai beli-belah</li><li>Keutamaan tema (skim warna yang dipilih)</li></ul><p>Memadam aplikasi akan membuang semua data ini dari peranti anda.</p>"},{"icon":"📢","title":"Pengiklanan (Google AdMob)","html":"<p>Aplikasi memaparkan iklan melalui <strong>Google AdMob</strong> (Google LLC) untuk pengguna percuma. AdMob boleh mengumpul:</p><ul><li>Pengecam iklan (IDFA) — hanya jika kebenaran App Tracking Transparency diberikan</li><li>Lokasi anggaran (dianggar daripada alamat IP)</li><li>Log ranap dan data prestasi</li><li>Tayangan iklan dan data interaksi</li></ul><p>Lihat <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Dasar Privasi Google</a> untuk butiran.</p><p>Membeli «Buang Iklan» akan menghentikan sepenuhnya penyiaran iklan AdMob.</p>"},{"icon":"🛒","title":"Pembelian Dalam Aplikasi","html":"<p>Aplikasi menawarkan pembelian sekali «Buang Iklan».</p><p>Semua pembayaran diproses oleh Apple (App Store). Kami tidak menerima maklumat pembayaran atau peribadi anda. Lihat <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Dasar Privasi Apple</a>.</p>"},{"icon":"🔒","title":"Perkongsian Maklumat","html":"<p>Kami tidak menjual atau berkongsi maklumat pengguna dengan pihak ketiga, kecuali dikehendaki oleh undang-undang.</p><p>Aplikasi menggunakan Google AdMob SDK. Data yang dikumpul oleh AdMob dihantar ke pelayan Google LLC. Lihat bahagian «Pengiklanan».</p>"},{"icon":"⚖️","title":"Undang-undang yang Terpakai","html":"<p>Dasar ini dikawal oleh undang-undang Jepun. Sebarang pertikaian tertakluk kepada bidang kuasa eksklusif mahkamah yang berkelayakan di lokasi pembangun.</p>"},{"icon":"⚠️","title":"Penafian","html":"<p>Walaupun aplikasi berusaha memberikan hasil pengiraan yang tepat, kami tidak menjamin kesempurnaan atau ketepatannya. Anggap semua keputusan hanya sebagai maklumat rujukan.</p><p>Kemas kini iOS boleh menjejaskan fungsi aplikasi tanpa notis awal.</p><p>Pembangun boleh menghentikan atau mengubah aplikasi tanpa notis awal.</p>"},{"icon":"🔄","title":"Perubahan pada Dasar Ini","html":"<p>Kami boleh mengemas kini dasar ini pada bila-bila masa. Perubahan berkuat kuasa apabila disiarkan di halaman ini. Perubahan ketara akan dimaklumkan dalam aplikasi.</p>"},{"icon":"📬","title":"Hubungi Kami","html":"<p>Anda boleh menghantar maklum balas tanpa nama melalui borang hubungan di <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"vi":{"meta":{"langName":"Tiếng Việt","selectLabel":"Ngôn ngữ","updatedLabel":"Cập nhật lần cuối","updatedDate":"Ngày 15 tháng 5 năm 2026"},"sections":[{"icon":"📋","title":"Giới thiệu","html":"<p>Đây là Chính sách Quyền riêng tư của <strong>PriceWise (単価比べ)</strong>, ứng dụng iOS được phát triển bởi Flying Dev Lab.</p><p>Vui lòng đọc chính sách này trước khi sử dụng ứng dụng.</p>"},{"icon":"💾","title":"Dữ liệu lưu trữ trên thiết bị","html":"<div class='zero-data'><p>🔒 Dữ liệu của bạn chỉ được lưu trên thiết bị và không bao giờ được gửi đến máy chủ của chúng tôi.</p></div><ul><li>Dữ liệu phiên so sánh (giá, số lượng, tên, ghi chú)</li><li>Danh sách mua sắm</li><li>Tùy chọn chủ đề (bảng màu đã chọn)</li></ul><p>Xóa ứng dụng sẽ xóa tất cả dữ liệu này khỏi thiết bị của bạn.</p>"},{"icon":"📢","title":"Quảng cáo (Google AdMob)","html":"<p>Ứng dụng hiển thị quảng cáo qua <strong>Google AdMob</strong> (Google LLC) cho người dùng miễn phí. AdMob có thể thu thập:</p><ul><li>Mã nhận dạng quảng cáo (IDFA) — chỉ khi quyền App Tracking Transparency được cấp</li><li>Vị trí gần đúng (ước tính từ địa chỉ IP)</li><li>Nhật ký sự cố và dữ liệu hiệu suất</li><li>Lượt hiển thị quảng cáo và dữ liệu tương tác</li></ul><p>Xem <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Chính sách Quyền riêng tư của Google</a> để biết chi tiết.</p><p>Mua «Xóa quảng cáo» sẽ dừng hoàn toàn việc phân phối quảng cáo AdMob.</p>"},{"icon":"🛒","title":"Mua hàng trong ứng dụng","html":"<p>Ứng dụng cung cấp mua một lần «Xóa quảng cáo».</p><p>Tất cả các khoản thanh toán được xử lý bởi Apple (App Store). Chúng tôi không nhận thông tin thanh toán hoặc thông tin cá nhân của bạn. Xem <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Chính sách Quyền riêng tư của Apple</a>.</p>"},{"icon":"🔒","title":"Chia sẻ thông tin","html":"<p>Chúng tôi không bán hoặc chia sẻ thông tin người dùng với bên thứ ba, ngoại trừ khi pháp luật yêu cầu.</p><p>Ứng dụng sử dụng Google AdMob SDK. Dữ liệu được AdMob thu thập sẽ được truyền đến máy chủ của Google LLC. Xem phần «Quảng cáo».</p>"},{"icon":"⚖️","title":"Luật áp dụng","html":"<p>Chính sách này được điều chỉnh bởi luật pháp Nhật Bản. Mọi tranh chấp thuộc quyền tài phán độc quyền của các tòa án có thẩm quyền tại địa điểm của nhà phát triển.</p>"},{"icon":"⚠️","title":"Tuyên bố miễn trách nhiệm","html":"<p>Mặc dù ứng dụng cố gắng cung cấp kết quả tính toán chính xác, chúng tôi không đảm bảo tính đầy đủ hoặc chính xác của chúng. Hãy coi tất cả kết quả chỉ là thông tin tham khảo.</p><p>Các bản cập nhật iOS có thể ảnh hưởng đến chức năng ứng dụng mà không có thông báo trước.</p><p>Nhà phát triển có thể chấm dứt hoặc sửa đổi ứng dụng mà không có thông báo trước.</p>"},{"icon":"🔄","title":"Thay đổi chính sách này","html":"<p>Chúng tôi có thể cập nhật chính sách này bất kỳ lúc nào. Các thay đổi có hiệu lực khi được đăng trên trang này. Các thay đổi quan trọng sẽ được thông báo trong ứng dụng.</p>"},{"icon":"📬","title":"Liên hệ","html":"<p>Bạn có thể gửi phản hồi ẩn danh qua biểu mẫu liên hệ tại <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"fil":{"meta":{"langName":"Filipino","selectLabel":"Wika","updatedLabel":"Huling na-update","updatedDate":"Mayo 15, 2026"},"sections":[{"icon":"📋","title":"Panimula","html":"<p>Ito ang Patakaran sa Privacy ng <strong>PriceWise (単価比べ)</strong>, isang iOS app na binuo ng Flying Dev Lab.</p><p>Mangyaring basahin ang patakarang ito bago gamitin ang app.</p>"},{"icon":"💾","title":"Data na Nakaimbak sa Iyong Device","html":"<div class='zero-data'><p>🔒 Ang iyong data ay nakaimbak lamang sa iyong device at hindi kailanman ipinapadala sa aming mga server.</p></div><ul><li>Data ng sesyon ng paghahambing (presyo, dami, pangalan, tala)</li><li>Listahan ng pamimili</li><li>Kagustuhan sa tema (napiling pamamaraan ng kulay)</li></ul><p>Ang pagtanggal ng app ay magtatanggal ng lahat ng data na ito mula sa iyong device.</p>"},{"icon":"📢","title":"Advertising (Google AdMob)","html":"<p>Ang app ay nagpapakita ng mga ad sa pamamagitan ng <strong>Google AdMob</strong> (Google LLC) para sa mga libreng gumagamit. Maaaring mangolekta ang AdMob ng:</p><ul><li>Identifier ng advertising (IDFA) — sa kondisyon lamang na maibigay ang pahintulot ng App Tracking Transparency</li><li>Tinatayang lokasyon (tinatayang mula sa IP address)</li><li>Mga crash log at data ng pagganap</li><li>Mga impression ng ad at data ng interaksyon</li></ul><p>Tingnan ang <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Patakaran sa Privacy ng Google</a> para sa mga detalye.</p><p>Ang pagbili ng «Alisin ang Mga Ad» ay ganap na titigil sa paghahatid ng ad ng AdMob.</p>"},{"icon":"🛒","title":"Mga Pagbili sa Loob ng App","html":"<p>Ang app ay nag-aalok ng isang beses na pagbili na «Alisin ang Mga Ad».</p><p>Lahat ng pagbabayad ay pinoproseso ng Apple (App Store). Hindi namin tinatanggap ang iyong impormasyon sa pagbabayad o personal na impormasyon. Tingnan ang <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Patakaran sa Privacy ng Apple</a>.</p>"},{"icon":"🔒","title":"Pagbabahagi ng Impormasyon","html":"<p>Hindi namin ibinebenta o ibinabahagi ang impormasyon ng gumagamit sa mga third party, maliban kung kinakailangan ng batas.</p><p>Ang app ay gumagamit ng Google AdMob SDK. Ang data na nakolekta ng AdMob ay ipinapadala sa mga server ng Google LLC. Tingnan ang seksyon ng «Advertising».</p>"},{"icon":"⚖️","title":"Naaangkop na Batas","html":"<p>Ang patakarang ito ay pinamamahalaan ng batas ng Japan. Ang anumang mga hindi pagkakaunawaan ay napapailalim sa eksklusibong hurisdiksyon ng mga hukuman sa lokasyon ng developer.</p>"},{"icon":"⚠️","title":"Disclaimer","html":"<p>Bagama't nagsisikap ang app na magbigay ng tumpak na mga resulta ng pagkalkula, hindi namin ginagarantiyahan ang kanilang pagkakumpleto o katumpakan. Ituring ang lahat ng resulta bilang impormasyon lamang ng sanggunian.</p><p>Ang mga update ng iOS ay maaaring makaapekto sa functionality ng app nang walang paunang abiso.</p><p>Maaaring wakasan o baguhin ng developer ang app nang walang paunang abiso.</p>"},{"icon":"🔄","title":"Mga Pagbabago sa Patakarang Ito","html":"<p>Maaari naming i-update ang patakarang ito anumang oras. Ang mga pagbabago ay magkakabisa kapag nai-post sa pahinang ito. Ang mga makabuluhang pagbabago ay ipaaalam sa loob ng app.</p>"},{"icon":"📬","title":"Makipag-ugnayan","html":"<p>Maaari kang magpadala ng anonymous na feedback sa pamamagitan ng form ng pakikipag-ugnayan sa <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"el":{"meta":{"langName":"Ελληνικά","selectLabel":"Γλώσσα","updatedLabel":"Τελευταία ενημέρωση","updatedDate":"15 Μαΐου 2026"},"sections":[{"icon":"📋","title":"Εισαγωγή","html":"<p>Αυτή είναι η Πολιτική Απορρήτου για το <strong>PriceWise (単価比べ)</strong>, μια εφαρμογή iOS που αναπτύχθηκε από τη Flying Dev Lab.</p><p>Παρακαλείστε να διαβάσετε αυτήν την πολιτική πριν χρησιμοποιήσετε την εφαρμογή.</p>"},{"icon":"💾","title":"Δεδομένα που αποθηκεύονται στη συσκευή σας","html":"<div class='zero-data'><p>🔒 Τα δεδομένα σας αποθηκεύονται μόνο στη συσκευή σας και δεν αποστέλλονται ποτέ στους διακομιστές μας.</p></div><ul><li>Δεδομένα σύγκρισης (τιμή, ποσότητα, όνομα, σημείωση)</li><li>Λίστα αγορών</li><li>Προτίμηση θέματος (επιλεγμένο χρωματικό σχήμα)</li></ul><p>Η διαγραφή της εφαρμογής αφαιρεί όλα αυτά τα δεδομένα από τη συσκευή σας.</p>"},{"icon":"📢","title":"Διαφήμιση (Google AdMob)","html":"<p>Η εφαρμογή εμφανίζει διαφημίσεις μέσω <strong>Google AdMob</strong> (Google LLC) για δωρεάν χρήστες. Το AdMob ενδέχεται να συλλέξει:</p><ul><li>Αναγνωριστικό διαφήμισης (IDFA) — μόνο εάν χορηγηθεί άδεια App Tracking Transparency</li><li>Κατά προσέγγιση τοποθεσία (εκτίμηση από διεύθυνση IP)</li><li>Αρχεία καταγραφής σφαλμάτων και δεδομένα απόδοσης</li><li>Εμφανίσεις διαφημίσεων και δεδομένα αλληλεπίδρασης</li></ul><p>Δείτε την <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Πολιτική Απορρήτου της Google</a> για λεπτομέρειες.</p><p>Η αγορά του «Κατάργηση διαφημίσεων» διακόπτει πλήρως την παράδοση διαφημίσεων AdMob.</p>"},{"icon":"🛒","title":"Αγορές εντός εφαρμογής","html":"<p>Η εφαρμογή προσφέρει μια εφάπαξ αγορά «Κατάργηση διαφημίσεων».</p><p>Όλες οι πληρωμές επεξεργάζονται από την Apple (App Store). Δεν λαμβάνουμε τα στοιχεία πληρωμής ή τα προσωπικά σας στοιχεία. Δείτε την <a href='https://www.apple.com/legal/privacy/' target='_blank' rel='noopener'>Πολιτική Απορρήτου της Apple</a>.</p>"},{"icon":"🔒","title":"Κοινοποίηση πληροφοριών","html":"<p>Δεν πωλούμε ούτε κοινοποιούμε πληροφορίες χρηστών σε τρίτους, εκτός εάν απαιτείται από το νόμο.</p><p>Η εφαρμογή χρησιμοποιεί το Google AdMob SDK. Τα δεδομένα που συλλέγονται από το AdMob μεταδίδονται στους διακομιστές της Google LLC. Δείτε την ενότητα «Διαφήμιση».</p>"},{"icon":"⚖️","title":"Εφαρμοστέο δίκαιο","html":"<p>Η παρούσα πολιτική διέπεται από τους νόμους της Ιαπωνίας. Οποιαδήποτε διαφορά υπάγεται στην αποκλειστική δικαιοδοσία των δικαστηρίων της τοποθεσίας του προγραμματιστή.</p>"},{"icon":"⚠️","title":"Αποποίηση ευθύνης","html":"<p>Αν και η εφαρμογή επιδιώκει να παρέχει ακριβή αποτελέσματα υπολογισμού, δεν εγγυόμαστε την πληρότητα ή την ακρίβειά τους. Αντιμετωπίστε όλα τα αποτελέσματα ως πληροφορίες αναφοράς μόνο.</p><p>Ενημερώσεις iOS ενδέχεται να επηρεάσουν τη λειτουργικότητα της εφαρμογής χωρίς προειδοποίηση.</p><p>Ο προγραμματιστής ενδέχεται να τερματίσει ή να τροποποιήσει την εφαρμογή χωρίς προειδοποίηση.</p>"},{"icon":"🔄","title":"Αλλαγές σε αυτήν την πολιτική","html":"<p>Ενδέχεται να ενημερώσουμε αυτήν την πολιτική οποιαδήποτε στιγμή. Οι αλλαγές τίθενται σε ισχύ κατά τη δημοσίευσή τους. Σημαντικές αλλαγές θα κοινοποιηθούν εντός της εφαρμογής.</p>"},{"icon":"📬","title":"Επικοινωνία","html":"<p>Μπορείτε να στείλετε ανώνυμα σχόλια μέσω της φόρμας επικοινωνίας στο <a href='https://flyingdevlab.com' target='_blank' rel='noopener'>flyingdevlab.com</a>.</p><div class='contact-box'><p>📧 <a href='mailto:support@flyingdevlab.com'>support@flyingdevlab.com</a></p></div>"}]},"hi":{"meta":{"langName":"हिन्दी","selectLabel":"भाषा","updatedLabel":"अंतिम अपडेट","updatedDate":"15 मई 2026"},"sections":[{"icon":"📋","title":"परिचय","html":"<p>यह Flying Dev Lab द्वारा विकसित iOS ऐप <strong>PriceWise (単価比べ)</strong> की गोपनीयता नीति है।</p><p>ऐप का उपयोग करने से पहले कृपया इस नीति को पढ़ें।</p>"},{"icon":"💾","title":"डिवाइस पर संग्रहीत डेटा","html":"<div class='zero-data'><p>🔒 आपका डेटा केवल आपके डिवाइस पर संग्रहीत है और हमारे सर्वर पर कभी नहीं भेजा जाता।</p></div><ul><li>तुलना सत्र डेटा (कीमत, मात्रा, नाम, नोट)</li><li>शॉपिंग सूची</li><li>थीम प्राथमिकता (चुनी गई रंग योजना)</li></ul><p>ऐप हटाने से आपके डिवाइस से यह सारा डेटा हट जाएगा।</p>"},{"icon":"📢","title":"विज्ञापन (Google AdMob)","html":"<p>ऐप मुफ्त उपयोगकर्ताओं के लिए <strong>Google AdMob</strong> (Google LLC) के माध्यम से विज्ञापन दिखाता है। AdMob निम्नलिखित एकत्र कर सकता है:</p><ul><li>विज्ञापन पहचानकर्ता (IDFA) — केवल तब जब App Tracking Transparency अनुमति दी गई हो</li><li>अनुमानित स्थान (IP पते से अनुमानित)</li><li>क्रैश लॉग और प्रदर्शन डेटा</li><li>विज्ञापन इंप्रेशन और इंटरेक्शन डेटा</li></ul><p>विवरण के लिए <a href='https://policies.google.com/privacy' target='_blank' rel='noopener'>Google की गोपनीयता नीति</a> देखें।</p><p>«विज्ञापन हटाएं» खरीदने से AdMob विज्ञापन पूरी तरह बंद हो जाते हैं।</p>"},{"icon":"🛒","title":"ऐप के अंदर खरीदारी","html":"<p>ऐप एकमुश्त खरीदारी «विज्ञापन हटाएं» प्रदान करता है।</p><p>सभी भुगतान Apple (App Store) द्वारा संसाधित किए जाते हैं। हम आपकी भुगतान जानकारी या व्यक्तिगत जानकारी प्राप्त न const LANG_MAP = {"ja":"ja","en":"en","en-US":"en","en-GB":"en","en-AU":"en","de":"de","de-AT":"de","de-CH":"de","fr":"fr","fr-CA":"fr","fr-BE":"fr","es":"es","es-MX":"es","es-AR":"es","it":"it","pt-BR":"pt-BR","pt":"pt-BR","pt-PT":"pt-BR","ko":"ko","zh-Hans":"zh-Hans","zh-CN":"zh-Hans","zh-SG":"zh-Hans","zh-Hant":"zh-Hant","zh-TW":"zh-Hant","zh-HK":"zh-Hant","zh":"zh-Hans","da":"da","nb":"nb","no":"nb","sv":"sv","fi":"fi","nl":"nl","nl-BE":"nl","pl":"pl","ru":"ru","tr":"tr","th":"th","id":"id","ms":"ms","vi":"vi","fil":"fil","tl":"fil","el":"el","hi":"hi"};
const SUPPORTED = Object.keys(T);

/*
 * detectLang()
 * ─────────────────────────────────────────────
 * 表示言語を自動検出して言語コードを返します。
 *
 * 検出の優先順位:
 *   1. localStorage の "pw-lang" キー（ユーザーが選択した言語を保存）
 *   2. navigator.languages（ブラウザの優先言語リスト）を上から順に LANG_MAP で照合
 *   3. どれも一致しなければ "ja"（デフォルト）
 *
 * MAKE10 の自動検出との違い:
 *   MAKE10 は localStorage を使わず navigator.language だけで毎回判定します。
 *   このファイルは localStorage でユーザー選択を永続化しているため、
 *   次回アクセス時も同じ言語が表示されます（ユーザー体験の向上）。
 */
function detectLang() {
  const saved = localStorage.getItem('pw-lang');
  if (saved && SUPPORTED.includes(saved)) return saved;
  const nav = (navigator.languages || [navigator.language || 'en']);
  for (const l of nav) {
    const code = LANG_MAP[l] || LANG_MAP[l.split('-')[0]];
    if (code) return code;
  }
  return 'ja';
}

/*
 * renderSection(s)
 * ─────────────────────────────────────────────
 * T[lang].sections の1要素を受け取り、カードの HTML 文字列を返します。
 * applyLang() が sections.map(renderSection) で全セクションを一括描画します。
 *
 * ⚠️ XSS（クロスサイトスクリプティング）に注意:
 *    s.html を innerHTML で直接挿入しています。
 *    翻訳データは開発者が管理する固定テキストのため問題ありませんが、
 *    ユーザー入力が含まれる場合は必ずエスケープ処理が必要です。
 */
function renderSection(s) {
  return `<div class="policy-section">
    <h2>${s.icon} ${s.title}</h2>
    ${s.html}
  </div>`;
}

/*
 * applyLang(code, save)
 * ─────────────────────────────────────────────
 * ページ全体の表示言語を切り替える関数です。
 * <select> の onchange と、ページ読み込み時の detectLang() の両方から呼ばれます。
 *
 * @param {string}  code - 適用する言語コード（例: "ja", "en", "zh-Hans"）
 * @param {boolean} save - true のとき選択言語を localStorage に保存する
 *                         初回自動検出時は false、ユーザーが選択したときは true
 *
 * 処理の流れ:
 *   1. <html lang="..."> 属性を更新（スクリーンリーダー・翻訳ツール向け）
 *   2. sections 配列を map(renderSection) で処理して innerHTML に一括挿入
 *   3. ヘッダーのタイトル・更新日・言語ラベル・<select> の値を同期
 *   4. save が true なら localStorage に言語コードを保存
 *
 * MAKE10 の setLang() との違い:
 *   setLang() は data-key 属性を querySelectorAll で走査してテキストを差し替えます。
 *   こちらは sections 配列を map() で処理して HTML ごと置き換えるアプローチです。
 */
function applyLang(code, save) {
  if (!SUPPORTED.includes(code)) code = 'ja';
  const d = T[code];
  document.documentElement.lang = code;
  document.getElementById('hd-title').textContent = d.sections[0].title !== '📋'
    ? d.meta.updatedLabel.includes('Last') ? 'Privacy Policy' : 'プライバシーポリシー'
    : 'プライバシーポリシー';

  // タイトルはセクション0のタイトルではなく言語ごとのキーワードで判定
  const titles = {
    en:'Privacy Policy', de:'Datenschutzrichtlinie', fr:'Politique de confidentialité',
    es:'Política de privacidad', it:'Informativa sulla privacy',
    'pt-BR':'Política de Privacidade', ko:'개인정보 처리방침',
    'zh-Hans':'隐私政策', 'zh-Hant':'隱私權政策', da:'Privatlivspolitik',
    nb:'Personvernerklæring', sv:'Integritetspolicy', fi:'Tietosuojakäytäntö',
    nl:'Privacybeleid', pl:'Polityka prywatności', ru:'Политика конфиденциальности',
    tr:'Gizlilik Politikası', th:'นโยบายความเป็นส่วนตัว',
    id:'Kebijakan Privasi', ms:'Dasar Privasi', vi:'Chính sách Quyền riêng tư',
    fil:'Patakaran sa Privacy', el:'Πολιτική Απορρήτου', hi:'गोपनीयता नीति', ja:'プライバシーポリシー'
  };
  document.getElementById('hd-title').textContent = titles[code] || 'Privacy Policy';
  document.getElementById('hd-updated').textContent =
    d.meta.updatedLabel + ': ' + d.meta.updatedDate;
  document.getElementById('lang-label').textContent = d.meta.selectLabel + ':';
  document.getElementById('ls').value = code;
  document.getElementById('content').innerHTML = d.sections.map(renderSection).join('');
  document.title = titles[code] + ' – PriceWise';
  if (save) localStorage.setItem('pw-lang', code);
}

applyLang(detectLang(), false);
</script>
